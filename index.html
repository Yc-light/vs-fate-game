<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS TATE - 回合制对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow: hidden;
            background: #000;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            position: relative;
        }

        .left-panel {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #4a90d9 0%, #2c5f8f 50%, #1a3a5c 100%);
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 70%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(100,180,255,0.2) 0%, transparent 40%);
        }

        .right-panel {
            width: 50%;
            height: 100%;
            background: linear-gradient(225deg, #c94c4c 0%, #8b2f2f 50%, #5c1a1a 100%);
            position: relative;
            overflow: hidden;
        }

        .right-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 70% 70%, rgba(255,200,200,0.1) 0%, transparent 50%),
                radial-gradient(circle at 30% 30%, rgba(255,107,107,0.2) 0%, transparent 40%);
        }

        .vs-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }

        .vs-text {
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,255,255,0.5),
                0 0 30px rgba(100,200,255,0.5),
                0 0 40px rgba(255,100,100,0.5),
                4px 4px 0px rgba(0,0,0,0.5);
            letter-spacing: 10px;
            animation: vsPulse 2s ease-in-out infinite;
        }

        .tate-text {
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,255,255,0.5),
                0 0 30px rgba(100,200,255,0.5),
                0 0 40px rgba(255,100,100,0.5),
                4px 4px 0px rgba(0,0,0,0.5);
            letter-spacing: 5px;
            animation: vsPulse 2s ease-in-out infinite;
        }

        @keyframes vsPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .decorative-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
        }

        .decorative-ring::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: ringRotate 10s linear infinite;
        }

        @keyframes ringRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .player-area {
            position: absolute;
            top: 80px;
            z-index: 50;
        }

        .player-left {
            left: 60px;
        }

        .player-right {
            right: 60px;
        }

        .avatar-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.8);
            overflow: hidden;
            position: relative;
            box-shadow: 
                0 0 20px rgba(0,0,0,0.5),
                inset 0 0 30px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #333 0%, #111 100%);
        }

        .player-left .avatar-container {
            border-color: #6bb6ff;
            box-shadow: 
                0 0 20px rgba(107,182,255,0.5),
                0 0 40px rgba(107,182,255,0.3),
                inset 0 0 30px rgba(0,0,0,0.3);
        }

        .player-right .avatar-container {
            border-color: #ff6b6b;
            box-shadow: 
                0 0 20px rgba(255,107,107,0.5),
                0 0 40px rgba(255,107,107,0.3),
                inset 0 0 30px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: rgba(255,255,255,0.9);
        }

        /* 战斗中宠物显示 - 在头像旁边 */
        .battle-pet {
            position: absolute;
            top: 50%;
            right: -60px;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #d4a84b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            z-index: 10;
            box-shadow: 0 0 15px rgba(212,168,75,0.5);
            animation: petFloat 2s ease-in-out infinite;
        }

        @keyframes petFloat {
            0%, 100% { transform: translateY(-50%) translateY(0); }
            50% { transform: translateY(-50%) translateY(-5px); }
        }

        .battle-pet.common { border-color: #888; box-shadow: 0 0 10px rgba(136,136,136,0.4); }
        .battle-pet.rare { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.5); }
        .battle-pet.epic { border-color: #a855f7; box-shadow: 0 0 15px rgba(168,85,247,0.6); }
        .battle-pet.legendary { border-color: #eab308; box-shadow: 0 0 20px rgba(234,179,8,0.7); animation: petFloat 2s ease-in-out infinite, petGlow 1.5s ease-in-out infinite; }

        @keyframes petGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .status-bars {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-left .status-bars {
            align-items: flex-start;
        }

        .player-right .status-bars {
            align-items: flex-end;
        }

        .hp-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .hp-bar-bg {
            width: 180px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444 0%, #ff6666 50%, #ff4444 100%);
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }

        .hp-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
            border-radius: 10px 10px 0 0;
        }

        .hp-text {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            min-width: 70px;
        }

        .np-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #4a90d9 0%, #2c5f8f 100%);
            padding: 6px 15px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .np-text {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .shield-indicator {
            background: linear-gradient(135deg, #4ecdc4 0%, #2a9a92 100%);
            padding: 6px 15px;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .defense-indicator {
            background: linear-gradient(135deg, #6b6b6b 0%, #4a4a4a 100%);
            padding: 6px 15px;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .skills-container {
            position: absolute;
            bottom: 80px;
            left: 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            z-index: 50;
        }

        .skill-btn {
            width: 160px;
            padding: 15px;
            border: 3px solid;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
        }

        .skill-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 0 rgba(0,0,0,0.5), 0 12px 30px rgba(0,0,0,0.4);
        }

        .skill-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .skill-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .skill-name {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }

        .skill-desc {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            line-height: 1.5;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @keyframes btnClick {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .skill-btn.clicking {
            animation: btnClick 0.2s ease;
        }

        .damage-number {
            position: absolute;
            font-size: 48px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: damageFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 200;
        }

        .heal-number {
            position: absolute;
            font-size: 48px;
            font-weight: bold;
            color: #44ff44;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: damageFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 200;
        }

        @keyframes damageFloat {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-80px) scale(1.2);
                opacity: 0;
            }
        }

        /* ==================== 技能特效系统 ==================== */
        .skill-effect-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 150;
            overflow: hidden;
        }

        /* ---- 攻击类特效 ---- */
        /* 剑气斩击 - 武士决进 */
        .effect-slash {
            position: absolute;
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #fff, #4a90d9, transparent);
            border-radius: 2px;
            box-shadow: 0 0 20px #4a90d9, 0 0 40px #4a90d9;
            animation: slashFly 0.6s ease-out forwards;
        }

        @keyframes slashFly {
            0% { transform: translateX(-100px) scaleX(0.5); opacity: 0; }
            30% { transform: translateX(0) scaleX(1); opacity: 1; }
            100% { transform: translateX(300px) scaleX(1.5); opacity: 0; }
        }

        /* 火球术 - 法师 */
        .effect-fireball {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b35 0%, #ff4500 40%, #8b0000 100%);
            box-shadow: 0 0 30px #ff6b35, 0 0 60px #ff4500, inset 0 0 20px #ffd700;
            animation: fireballFly 0.8s ease-out forwards;
        }

        .effect-fireball::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700 0%, transparent 70%);
            animation: fireCorePulse 0.2s ease-in-out infinite;
        }

        @keyframes fireCorePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        @keyframes fireballFly {
            0% { transform: translateX(-50px) scale(0.5); opacity: 0; }
            20% { transform: translateX(0) scale(1); opacity: 1; }
            80% { transform: translateX(250px) scale(1); opacity: 1; }
            100% { transform: translateX(300px) scale(1.5); opacity: 0; }
        }

        /* 爆炸效果 */
        .effect-explosion {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            animation: explosionExpand 0.5s ease-out forwards;
        }

        .effect-explosion::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,107,53,0.6) 30%, rgba(255,69,0,0.3) 60%, transparent 100%);
        }

        @keyframes explosionExpand {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* 元素风暴 - 法师大招 */
        .effect-elemental-storm {
            position: absolute;
            width: 300px;
            height: 300px;
            animation: stormRotate 1s ease-out forwards;
        }

        .storm-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid;
            animation: stormRingExpand 0.8s ease-out forwards;
        }

        .storm-ring:nth-child(1) { border-color: #ff6b35; width: 100%; height: 100%; top: 0; left: 0; }
        .storm-ring:nth-child(2) { border-color: #4ecdc4; width: 70%; height: 70%; top: 15%; left: 15%; animation-delay: 0.1s; }
        .storm-ring:nth-child(3) { border-color: #a855f7; width: 40%; height: 40%; top: 30%; left: 30%; animation-delay: 0.2s; }

        @keyframes stormRingExpand {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2) rotate(180deg); opacity: 0; }
        }

        .storm-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: stormParticleFly 0.6s ease-out forwards;
        }

        @keyframes stormParticleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* 精准射击 - 射手 */
        .effect-arrow {
            position: absolute;
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fff, #16a34a, transparent);
            box-shadow: 0 0 15px #16a34a;
            animation: arrowFly 0.5s ease-out forwards;
        }

        .effect-arrow::after {
            content: '';
            position: absolute;
            right: -10px;
            top: -4px;
            width: 0;
            height: 0;
            border-left: 12px solid #16a34a;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        @keyframes arrowFly {
            0% { transform: translateX(-80px) scaleX(0.3); opacity: 0; }
            30% { transform: translateX(0) scaleX(1); opacity: 1; }
            100% { transform: translateX(350px) scaleX(1); opacity: 0; }
        }

        /* 连射 - 多支箭 */
        .effect-multi-arrow {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #15803d, transparent);
            box-shadow: 0 0 10px #15803d;
            animation: multiArrowFly 0.4s ease-out forwards;
        }

        @keyframes multiArrowFly {
            0% { transform: translateX(-60px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(300px); opacity: 0; }
        }

        /* 毒箭 - 绿色毒雾 */
        .effect-poison {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(132,204,22,0.6) 0%, rgba(101,163,13,0.3) 50%, transparent 100%);
            animation: poisonSpread 1s ease-out forwards;
        }

        @keyframes poisonSpread {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* 盾击 */
        .effect-shield-bash {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #64748b;
            animation: shieldBash 0.5s ease-out forwards;
        }

        @keyframes shieldBash {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1.5) translateX(100px); opacity: 0; }
        }

        /* ---- 防御类特效 ---- */
        /* 无敌状态 - 潜龙 */
        .effect-invincible {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid rgba(201,76,76,0.8);
            box-shadow: 0 0 30px rgba(201,76,76,0.5), inset 0 0 30px rgba(201,76,76,0.3);
            animation: invinciblePulse 0.8s ease-out forwards;
        }

        .effect-invincible::before {
            content: '';
            position: absolute;
            top: 10%; left: 10%; right: 10%; bottom: 10%;
            border-radius: 50%;
            border: 2px dashed rgba(255,215,0,0.6);
            animation: invincibleRotate 2s linear infinite;
        }

        @keyframes invinciblePulse {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes invincibleRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 护盾特效 */
        .effect-shield {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #4ecdc4;
            box-shadow: 0 0 25px #4ecdc4, inset 0 0 25px rgba(78,205,196,0.3);
            animation: shieldAppear 0.6s ease-out forwards;
        }

        .effect-shield::before {
            content: '';
            position: absolute;
            top: 15%; left: 15%; right: 15%; bottom: 15%;
            border-radius: 50%;
            border: 2px solid rgba(78,205,196,0.5);
        }

        @keyframes shieldAppear {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.9; }
        }

        /* 格挡特效 */
        .effect-block {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(71,85,105,0.4) 0%, transparent 70%);
            border: 3px solid #475569;
            animation: blockAppear 0.5s ease-out forwards;
        }

        @keyframes blockAppear {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* ---- 治疗类特效 ---- */
        /* 治疗光芒 */
        .effect-heal {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            animation: healGlow 1s ease-out forwards;
        }

        .effect-heal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139,90,159,0.5) 0%, rgba(168,85,247,0.3) 40%, transparent 70%);
        }

        .heal-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #a855f7;
            box-shadow: 0 0 8px #a855f7;
            animation: healParticleRise 1s ease-out forwards;
        }

        @keyframes healGlow {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        @keyframes healParticleRise {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        /* 铁壁 - 治疗+护盾组合 */
        .effect-ironwall {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 3px solid #334155;
            box-shadow: 0 0 20px #334155, inset 0 0 20px rgba(51,65,85,0.3);
            animation: ironwallAppear 0.8s ease-out forwards;
        }

        .effect-ironwall::before {
            content: '';
            position: absolute;
            top: 20%; left: 20%; right: 20%; bottom: 20%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139,90,159,0.3) 0%, transparent 70%);
        }

        @keyframes ironwallAppear {
            0% { transform: scale(0); opacity: 0; }
            40% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* ---- 敌方攻击特效 ---- */
        /* 敌方普通攻击 */
        .effect-enemy-attack {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,68,68,0.6) 0%, rgba(139,0,0,0.3) 50%, transparent 100%);
            animation: enemyAttackFly 0.5s ease-out forwards;
        }

        @keyframes enemyAttackFly {
            0% { transform: translateX(100px) scale(0.5); opacity: 0; }
            50% { transform: translateX(0) scale(1); opacity: 1; }
            100% { transform: translateX(-200px) scale(0.8); opacity: 0; }
        }

        /* 敌方重击 */
        .effect-enemy-heavy {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,0,0.7) 0%, rgba(139,0,0,0.4) 40%, transparent 70%);
            border: 3px solid rgba(255,0,0,0.5);
            animation: enemyHeavyFly 0.6s ease-out forwards;
        }

        @keyframes enemyHeavyFly {
            0% { transform: translateX(150px) scale(0.3); opacity: 0; }
            40% { transform: translateX(0) scale(1.2); opacity: 1; }
            100% { transform: translateX(-250px) scale(0.5); opacity: 0; }
        }

        /* 敌方治疗 */
        .effect-enemy-heal {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,107,107,0.4) 0%, rgba(201,76,76,0.2) 50%, transparent 100%);
            animation: enemyHealPulse 0.8s ease-out forwards;
        }

        @keyframes enemyHealPulse {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* 屏幕震动 */
        .screen-shake {
            animation: screenShake 0.3s ease-out;
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(5px, 5px); }
        }

        /* 受击闪光 */
        .hit-flash {
            animation: hitFlash 0.2s ease-out;
        }

        @keyframes hitFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(2) saturate(2); }
            100% { filter: brightness(1); }
        }

        /* 粒子系统 */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.8s ease-out forwards;
        }

        @keyframes particleFade {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
        }

        /* 性能优化：减少动画复杂度 */
        @media (prefers-reduced-motion: reduce) {
            .effect-slash, .effect-fireball, .effect-explosion,
            .effect-elemental-storm, .effect-arrow, .effect-multi-arrow,
            .effect-poison, .effect-shield-bash, .effect-invincible,
            .effect-shield, .effect-block, .effect-heal,
            .effect-ironwall, .effect-enemy-attack, .effect-enemy-heavy,
            .effect-enemy-heal {
                animation-duration: 0.3s !important;
            }
            .storm-particle, .heal-particle, .particle {
                display: none !important;
            }
        }

        /* ==================== 特效系统结束 ==================== */

        /* ==================== 装备系统样式 ==================== */
        .equipment-overlay {

            top: 0;
            left: 0;

        }

        }

        @keyframes fadeIn {

        .equipment-modal {

        }

        .equipment-grid {

        .equipment-card {

        .equipment-name {

        }

        .equipment-rarity {

        }

        .rarity-common {
            background: rgba(150,150,150,0.2);

            border: 1px solid #888;

        .rarity-rare {

        }

        @keyframes legendaryPulse {

        .equipment-effect {

        .equipment-stats {

        .equipment-confirm-btn {

            transition: all 0.3s ease;
        }

        .equipment-confirm-btn:hover {

        }

        .equipment-confirm-btn:disabled {

        }

        /* 关卡信息 */
        .stage-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);

            border-radius: 10px;
            padding: 8px 20px;
            z-index: 100;
            text-align: center;
        }

        .stage-text {
            color: #d4a84b;

        }

        .stage-progress {
            color: rgba(255,255,255,0.6);

        /* 当前装备显示 */
        .equipped-items {

        .equipped-item {

        }

        .equipped-item:hover {
            transform: scale(1.2);
        }

        /* 战斗中道具显示 */
        .battle-items {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .battle-item {

        .battle-item:hover {
            transform: scale(1.15);

        }

        .battle-item-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 5px;
            border-radius: 8px;
            border: 1px solid #fff;
        }

        /* 精英怪样式 */
        .elite-indicator {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            border: 2px solid #fff;
            animation: eliteGlow 2s ease-in-out infinite;
        }

        @keyframes eliteGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(168,85,247,0.5); }
            50% { box-shadow: 0 0 15px rgba(168,85,247,0.8); }
        }

        /* ==================== 装备系统样式结束 ==================== */

        .battle-log {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            max-height: 150px;
            background: rgba(80,80,80,0.9);
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            z-index: 50;
            border: 2px solid rgba(150,150,150,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .log-entry {
            color: #fff;
            font-size: 14px;
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 5px;
            animation: logFadeIn 0.3s ease;
        }

        @keyframes logFadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry.player {
            background: rgba(74,144,217,0.3);
            border-left: 3px solid #4a90d9;
        }

        .log-entry.enemy {
            background: rgba(201,76,76,0.3);
            border-left: 3px solid #c94c4c;
        }

        .log-entry.system {
            background: rgba(255,255,255,0.1);
            border-left: 3px solid #999;
            text-align: center;
            font-style: italic;
        }

        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid;
            animation: modalPop 0.5s ease;
        }

        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-content.victory {
            border-color: #4a90d9;
            box-shadow: 0 0 50px rgba(74,144,217,0.5);
        }

        .modal-content.defeat {
            border-color: #c94c4c;
            box-shadow: 0 0 50px rgba(201,76,76,0.5);
        }

        .modal-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal-title.victory {
            color: #4a90d9;
            text-shadow: 0 0 20px rgba(74,144,217,0.8);
        }

        .modal-title.defeat {
            color: #c94c4c;
            text-shadow: 0 0 20px rgba(201,76,76,0.8);
        }

        .modal-btn {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .modal-btn:hover {
            transform: scale(1.05);
        }

        .btn-restart {
            background: linear-gradient(135deg, #4a90d9 0%, #2c5f8f 100%);
            color: #fff;
        }

        .btn-load {
            background: linear-gradient(135deg, #8b5a9f 0%, #5a3a6f 100%);
            color: #fff;
        }

        /* 战斗结算界面 */
        .reward-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            animation: fadeIn 0.3s ease;
        }

        .reward-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .reward-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border: 3px solid #fbbf24;

            padding: 40px 60px;
            text-align: center;

            width: 90%;
            animation: modalPop 0.5s ease;
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.4);
        }

        .reward-title {
            font-size: 36px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);

        }

        .reward-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .reward-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .reward-item-icon {
            font-size: 40px;
        }

        .reward-item-info {
            text-align: left;
        }

        .reward-item-name {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .reward-item-desc {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .reward-chest-animation {

        }

        @keyframes chestBounce {
            0%, 100% { transform: scale(1); }

        .reward-btn {
            padding: 15px 50px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;

            transition: all 0.3s ease;

        .reward-btn:hover {
            transform: scale(1.05);

        }

        .turn-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 30px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
        }

        .turn-indicator.player-turn {
            border-color: #4a90d9;

            border-color: #c94c4c;
            box-shadow: 0 0 20px rgba(201,76,76,0.5);

            right: 20px;
            background: rgba(139,90,159,0.8);

            border-radius: 20px;

            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;

        .save-indicator.show {

        .invincible {
            animation: invinciblePulse 1s ease-in-out infinite;

        @keyframes invinciblePulse {

                transform: scale(1);

            50% {

            }

            .vs-text, .tate-text {

            .skill-desc {

<body>
    <div class="game-container">
        <div class="left-panel"></div>
        <div class="right-panel"></div>
        <div class="decorative-ring"></div>
        
        <div class="vs-title">
            <div class="vs-text">VS</div>
            <div class="tate-text">TATE</div>
        </div>
        
        <div class="turn-indicator player-turn" id="turnIndicator">
            你的回合
        </div>
        
        <div class="save-indicator" id="saveIndicator">
            游戏已自动保存
        </div>
        
        <div class="player-area player-left">
            <div class="avatar-container" id="playerAvatar">
                <div class="avatar" id="playerAvatarIcon">⚔️</div>
            </div>
            <div class="battle-pet" id="battlePet" style="display: none;"></div>
            <div class="status-bars">
                <div class="hp-bar-container">
                    <div class="hp-bar-bg">
                        <div class="hp-bar-fill" id="playerHpBar" style="width: 100%;"></div>
                    </div>
                    <div class="hp-text" id="playerHpText">50/50 HP</div>
                </div>
                <div class="np-bar-container">
                    <div class="np-text" id="playerNpText">NP: 15</div>
                </div>
                <div class="shield-indicator" id="shieldIndicator" style="display: none;">
                    护盾: 0
                </div>
                <div class="defense-indicator" id="defenseIndicator" style="display: none;">
                    减伤: 0
                </div>
            </div>
        </div>
        
        <div class="player-area player-right">
            <div class="avatar-container" id="enemyAvatar">
                <div class="avatar">👹</div>
            </div>
            <div class="status-bars">
                <div class="hp-bar-container">
                    <div class="hp-text" id="enemyHpText">50/50 HP</div>
                    <div class="hp-bar-bg">
                        <div class="hp-bar-fill" id="enemyHpBar" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="np-bar-container">
                    <div class="np-text" id="enemyNpText">NP: 15</div>
                </div>
            </div>
        </div>
        
        <!-- 关卡信息 -->
        <div class="stage-info" id="stageInfo" style="display: none;">
            <div class="stage-text" id="stageText">第 1 关</div>
            <div class="stage-progress" id="stageProgress">1 / 2</div>
        </div>

        <!-- 当前装备显示 -->
        <div class="equipped-items" id="equippedItems"></div>

        <!-- 战斗中道具显示 -->
        <div class="battle-items" id="battleItems"></div>

        <div class="battle-log" id="battleLog"></div>
        <div class="enemy-action" id="enemyAction">敌方正在行动...</div>
        <div class="skills-container" id="skillsContainer"></div>
        
        <!-- 装备选择界面 -->
        <div class="equipment-overlay" id="equipmentOverlay">
            <div class="equipment-modal">
                <div class="equipment-title">🎁 装备选择</div>
                <div class="equipment-subtitle" id="equipmentSubtitle">击败敌人！请选择一件装备</div>
                <div class="equipment-grid" id="equipmentGrid"></div>
                <button class="equipment-confirm-btn" id="equipmentConfirmBtn" onclick="confirmEquipment()" disabled>确认选择</button>
            </div>
        </div>
        
        <!-- 战斗结算界面 -->
        <div class="reward-overlay" id="rewardOverlay">
            <div class="reward-modal">
                <div class="reward-title">🎉 战斗胜利!</div>
                <div class="reward-items" id="rewardItems"></div>
                <button class="reward-btn" onclick="closeRewardAndShowGameOver()">继续</button>
            </div>
        </div>

        <div class="game-over-modal" id="gameOverModal">
            <div class="modal-content" id="modalContent">
                <div class="modal-title" id="modalTitle">胜利!</div>
