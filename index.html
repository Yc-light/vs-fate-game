        // 更新关卡信息显示
        function updateStageInfo() {
            const stage = stageSystem.stages[stageSystem.currentStage];
            const stageText = stage.type === 'boss' ? 'Boss战' : (stage.type === 'elite' ? '精英战' : `第 ${stageSystem.currentStage + 1} 关`);
            document.getElementById('stageText').textContent = stageText;
            document.getElementById('stageProgress').textContent = `${stageSystem.currentStage + 1} / ${stageSystem.totalStages}`;

            // 更新敌人名称显示
            const enemyNameEl = document.querySelector('.right-panel .character-name');
            if (enemyNameEl) {
                enemyNameEl.textContent = stage.name;
            }

            // 精英怪标记
            const enemyAvatar = document.querySelector('.right-panel .avatar');
            if (enemyAvatar) {
                const existingElite = enemyAvatar.querySelector('.elite-indicator');
                if (existingElite) existingElite.remove();
                if (stage.type === 'elite') {
                    const eliteBadge = document.createElement('div');
                    eliteBadge.className = 'elite-indicator';
                    eliteBadge.textContent = 'ELITE';
                    enemyAvatar.appendChild(eliteBadge);
                }
            }
        }

        // 加载当前关卡敌人
        function loadCurrentStage() {
            const stage = stageSystem.stages[stageSystem.currentStage];
            if (!stage) return false;

            stageSystem.isBossStage = stage.type === 'boss';

            // 重置敌人状态
            gameState.enemy.hp = stage.hp;
            gameState.enemy.maxHp = stage.maxHp;
            gameState.enemy.np = stage.np;
            gameState.enemy.maxNp = stage.maxNp;
            gameState.enemy.poison = 0;

            // 应用装备效果（开始护盾）
            const startShield = getEquippedStat('startShield');
            if (startShield > 0) {
                gameState.player.shield = startShield;
            }

            updateStageInfo();
            updateUI();
            addLog(`=== ${stage.name} 出现！===`, 'system');
            return true;
        }

        // 进入下一关
        function nextStage() {
            stageSystem.currentStage++;

            if (stageSystem.currentStage >= stageSystem.totalStages) {
                // 所有关卡完成，胜利
                showGameOver(true);
                return;
            }

            // 回复一定HP和NP
            const healPercent = 0.3;
            const npRecover = Math.floor(gameState.player.maxNp * 0.5);
            const hpRecover = Math.floor(gameState.player.maxHp * healPercent);

            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + hpRecover);
            gameState.player.np = Math.min(gameState.player.maxNp, gameState.player.np + npRecover);

            addLog(`关卡通过！回复 ${hpRecover} HP 和 ${npRecover} NP`, 'system');

            // 重置玩家状态
            gameState.player.invincible = false;
            gameState.player.shield = 0;
            gameState.player.damageReduction = 0;
            document.getElementById('playerAvatar').classList.remove('invincible');
            gameState.turn = 'player';
            gameState.isProcessing = false;

            // 显示装备选择
            showEquipmentSelect();
        }

        // 显示装备选择界面
        function showEquipmentSelect() {
            const stage = stageSystem.stages[stageSystem.currentStage - 1];
            const rewardTier = stage ? stage.rewardTier : 'common';

            // 根据关卡品质筛选可用装备
            let availableEquipments = EQUIPMENTS.filter(e => {
                if (rewardTier === 'common') return e.rarity === 'common';
                if (rewardTier === 'rare') return e.rarity === 'common' || e.rarity === 'rare';
                if (rewardTier === 'epic') return e.rarity === 'rare' || e.rarity === 'epic';
                if (rewardTier === 'legendary') return e.rarity === 'epic' || e.rarity === 'legendary';
                return true;
            });

            // 随机选择3件
            const selectedEquipments = [];
            const tempPool = [...availableEquipments];
            for (let i = 0; i < 3 && tempPool.length > 0; i++) {
                const idx = Math.floor(Math.random() * tempPool.length);
                selectedEquipments.push(tempPool[idx]);
                tempPool.splice(idx, 1);
            }

            // 渲染装备选择界面
            const grid = document.getElementById('equipmentGrid');
            grid.innerHTML = '';

            selectedEquipments.forEach((equip, index) => {
                const card = document.createElement('div');
                card.className = 'equipment-card';
                card.style.setProperty('--equip-color', equip.color);
                card.style.setProperty('--equip-glow', equip.color + '4d');
                card.onclick = () => selectEquipment(index, card);
                card.dataset.index = index;
                card.dataset.equipId = equip.id;

                const rarityClass = `rarity-${equip.rarity}`;
                const rarityText = { common: '普通', rare: '稀有', epic: '史诗', legendary: '传说' }[equip.rarity];

                card.innerHTML = `
                    <span class="equipment-icon">${equip.icon}</span>
                    <div class="equipment-name">${equip.name}</div>
                    <div class="equipment-rarity ${rarityClass}">${rarityText}</div>
                    <div class="equipment-effect">${equip.description}</div>
                `;

                grid.appendChild(card);
            });

            document.getElementById('equipmentSubtitle').textContent = `击败${stage.name}！请选择一件装备`;
            document.getElementById('equipmentConfirmBtn').disabled = true;
            document.getElementById('equipmentOverlay').classList.add('show');
        }

        // 选择装备
        let selectedEquipmentIndex = -1;
        function selectEquipment(index, cardElement) {
            document.querySelectorAll('.equipment-card').forEach(c => c.classList.remove('selected'));
            cardElement.classList.add('selected');
            selectedEquipmentIndex = index;
            document.getElementById('equipmentConfirmBtn').disabled = false;
        }

        // 确认装备选择
        function confirmEquipment() {
            const cards = document.querySelectorAll('.equipment-card');
            const selectedCard = cards[selectedEquipmentIndex];
            if (!selectedCard) return;

            const equipId = selectedCard.dataset.equipId;
            const equip = EQUIPMENTS.find(e => e.id === equipId);
            if (equip) {
                stageSystem.equippedItems.push(equip);
                applyEquipmentEffects();
                updateEquippedDisplay();
                addLog(`获得装备：${equip.name}！${equip.description}`, 'system');

                // 检查装备成就
                checkEquipmentAchievements(equip);
            }

            document.getElementById('equipmentOverlay').classList.remove('show');
            selectedEquipmentIndex = -1;

            // 加载下一关
            setTimeout(() => {
                loadCurrentStage();
                addLog('你的回合', 'player');
            }, 500);
        }

        // 检查装备类成就
        function checkEquipmentAchievements(equip) {
            if (!currentUser) return;
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (!users[currentUser]) return;

            if (!users[currentUser].achievements) users[currentUser].achievements = { earned: [], progress: {}, newlyUnlocked: 0 };
            if (!users[currentUser].achievements.progress) users[currentUser].achievements.progress = {};

            const earned = users[currentUser].achievements.earned;

            // 首次获得装备成就
            if (!earned.includes('first_equipment')) {
                earned.push('first_equipment');
                users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
            }

            // 记录获得的装备ID（当局游戏）
            if (!users[currentUser].achievements.progress.equipmentObtained) {
                users[currentUser].achievements.progress.equipmentObtained = [];
            }
            if (!users[currentUser].achievements.progress.equipmentObtained.includes(equip.id)) {
                users[currentUser].achievements.progress.equipmentObtained.push(equip.id);
            }

            const uniqueEquipmentCount = users[currentUser].achievements.progress.equipmentObtained.length;

            // 装备收藏家成就（5件）
            if (uniqueEquipmentCount >= 5 && !earned.includes('equipment_collector_5')) {
                earned.push('equipment_collector_5');
                users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
            }

            // 装备大师成就（10件）
            if (uniqueEquipmentCount >= 10 && !earned.includes('equipment_collector_10')) {
                earned.push('equipment_collector_10');
                users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
            }

            // 传说装备成就
            if (equip.rarity === 'legendary' && !earned.includes('legendary_equipment')) {
                earned.push('legendary_equipment');
                users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
            }

            localStorage.setItem('vsFateUsers', JSON.stringify(users));
        }

        // 应用装备效果
        function applyEquipmentEffects() {
            // 重置基础属性
            gameState.player.maxHp = selectedClass.maxHp;
            gameState.player.maxNp = selectedClass.maxNp;

            // 应用所有装备加成
            stageSystem.equippedItems.forEach(equip => {
                if (equip.stats.maxHpBonus) {
                    gameState.player.maxHp += equip.stats.maxHpBonus;
                }
                if (equip.stats.maxNpBonus) {
                    gameState.player.maxNp += equip.stats.maxNpBonus;
                }
            });

            // 确保当前HP/NP不超过新上限
            gameState.player.hp = Math.min(gameState.player.hp, gameState.player.maxHp);
            gameState.player.np = Math.min(gameState.player.np, gameState.player.maxNp);
        }

        // 获取装备属性总和
        function getEquippedStat(statName) {
            return stageSystem.equippedItems.reduce((sum, equip) => {
                return sum + (equip.stats[statName] || 0);
            }, 0);
        }

        // 更新装备显示
        function updateEquippedDisplay() {
            const container = document.getElementById('equippedItems');
            container.innerHTML = '';
            stageSystem.equippedItems.forEach(equip => {
                const item = document.createElement('div');
                item.className = 'equipped-item';
                item.style.setProperty('--equip-color', equip.color);
                item.textContent = equip.icon;
                item.title = `${equip.name}: ${equip.description}`;
                container.appendChild(item);
            });
        }

        // 加载战斗中携带的道具
        function loadBattleItems() {
            const container = document.getElementById('battleItems');
            container.innerHTML = '';
            
            if (!currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (!users[currentUser] || !users[currentUser].inventory) return;
            
            const equippedItems = users[currentUser].inventory.filter(i => i.equipped);
            
            equippedItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'battle-item';
                div.style.setProperty('--item-color', item.color);
                div.textContent = item.icon;
                div.title = `${item.name}: ${item.effect}`;
                div.onclick = () => useBattleItem(item);
                container.appendChild(div);
            });
        }

        // 使用战斗道具
        function useBattleItem(item) {
            if (gameState.isProcessing || gameState.turn !== 'player' || gameState.gameOver) {
                return;
            }
            
            gameState.isProcessing = true;
            
            // 应用道具效果
            let effectMsg = `使用了 ${item.name}！`;
            
            // 恢复HP
            if (item.stats.hp) {
                const heal = Math.min(item.stats.hp, gameState.player.maxHp - gameState.player.hp);
                gameState.player.hp += heal;
                effectMsg += ` 回复${heal}HP`;
                showHealNumber(heal, 'player');
            }
            
            // 恢复NP
            if (item.stats.np) {
                const npRecover = Math.min(item.stats.np, gameState.player.maxNp - gameState.player.np);
                gameState.player.np += npRecover;
                effectMsg += ` 回复${npRecover}NP`;
            }
            
            // 攻击加成
            if (item.stats.attackBoost) {
                gameState.player.attackBoost = item.stats.attackBoost;
                gameState.player.attackBoostDuration = item.stats.duration || 2;
                effectMsg += ` 攻击+${(item.stats.attackBoost * 100).toFixed(0)}%(${gameState.player.attackBoostDuration}回合)`;
            }
            
            // 全属性加成
            if (item.stats.allBoost) {
                gameState.player.allBoost = item.stats.allBoost;
                gameState.player.allBoostDuration = item.stats.duration || 3;
                effectMsg += ` 全属性+${(item.stats.allBoost * 100).toFixed(0)}%(${gameState.player.allBoostDuration}回合)`;
            }
            
            // 护盾
            if (item.stats.shieldPercent) {
                const shieldAmount = Math.floor(gameState.player.maxHp * item.stats.shieldPercent);
                gameState.player.shield += shieldAmount;
                effectMsg += ` 护盾+${shieldAmount}`;
            }
            
            addLog(effectMsg, 'player');

            // 检查道具使用成就
            checkItemUseAchievement();

            // 从背包中移除该道具
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (users[currentUser] && users[currentUser].inventory) {
                const idx = users[currentUser].inventory.findIndex(i => i.instanceId === item.instanceId);
                if (idx !== -1) {
                    users[currentUser].inventory.splice(idx, 1);
                    localStorage.setItem('vsFateUsers', JSON.stringify(users));
                }
            }
            
            // 更新道具显示
            loadBattleItems();
            updateUI();
            
            // 结束玩家回合
            setTimeout(() => {
                gameState.turn = 'enemy';
                updateTurnIndicator();
                updateUI();
                enemyTurn();
            }, 1000);
        }

        // 检查道具使用成就
        function checkItemUseAchievement() {
            if (!currentUser) return;
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (!users[currentUser]) return;

            if (!users[currentUser].achievements) users[currentUser].achievements = { earned: [], progress: {}, newlyUnlocked: 0 };
            const earned = users[currentUser].achievements.earned;

            // 道具专家成就
            if (!earned.includes('item_user')) {
                earned.push('item_user');
                users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
                localStorage.setItem('vsFateUsers', JSON.stringify(users));
            }
        }

        // 获取携带的宠物加成
        function getPetBonus() {
            if (!currentUser) return 0;
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (!users[currentUser]) return 0;
            const equippedPetId = users[currentUser].equippedPet;
            if (!equippedPetId) return 0;

            const petData = {
                'pet_slime': { name: '史莱姆', statBonus: 1 },
                'pet_chicken': { name: '小鸡', statBonus: 1 },
                'pet_ant': { name: '蚂蚁', statBonus: 1 },
                'pet_frog': { name: '青蛙', statBonus: 1 },
                'pet_cat': { name: '猫咪', statBonus: 2 },
                'pet_dog': { name: '狗狗', statBonus: 2 },
                'pet_rabbit': { name: '兔子', statBonus: 2 },
                'pet_wolf': { name: '战狼', statBonus: 3 },
                'pet_dragon': { name: '幼龙', statBonus: 3 },
                'pet_phoenix': { name: '凤凰', statBonus: 4 }
            };

            const pet = petData[equippedPetId];
            return pet ? pet.statBonus : 0;
        }

        // 计算装备加成后的技能伤害
        function getSkillDamage(baseDamage) {
            const attackBonus = getEquippedStat('attackBonus');
            const skillBoost = getEquippedStat('skillBoost');
            const petBonus = getPetBonus();
            let damage = baseDamage + attackBonus + petBonus;
            if (skillBoost > 0) {
                damage = Math.floor(damage * (1 + skillBoost));
            }
            return damage;
        }

        // 初始化游戏
        function initGame() {
            // 获取选择的职业和难度
            const classId = localStorage.getItem('selectedClass') || 'samurai';
            const difficultyId = localStorage.getItem('selectedDifficulty') || 'normal';
            selectedClass = CLASSES[classId];
            selectedDifficulty = DIFFICULTIES[difficultyId];

            // 获取宠物加成
            const petBonus = getPetBonus();

            // 初始化玩家状态（应用宠物加成）
            gameState.player.hp = selectedClass.hp + petBonus;
            gameState.player.np = selectedClass.np + petBonus;
            gameState.player.maxHp = selectedClass.maxHp + petBonus;
            gameState.player.maxNp = selectedClass.maxNp + petBonus;
            gameState.player.invincible = false;
            gameState.player.shield = 0;
            gameState.player.damageReduction = 0;
            gameState.player.attackBoost = 0;
            gameState.player.attackBoostDuration = 0;
            gameState.player.allBoost = 0;
            gameState.player.allBoostDuration = 0;

            // 初始化关卡系统
            initStageSystem();

            // 更新头像
            document.getElementById('playerAvatarIcon').textContent = selectedClass.icon;

            // 生成技能按钮
            renderSkillButtons();

            // 加载战斗中携带的道具
            loadBattleItems();

            // 加载第一关
            loadCurrentStage();
            updateUI();

            // 显示宠物信息和头像
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            const equippedPetId = users[currentUser]?.equippedPet;
            if (equippedPetId) {
                const petData = {
                    'pet_slime': { name: '史莱姆', icon: '🟢', rarity: 'common' },
                    'pet_chicken': { name: '小鸡', icon: '🐤', rarity: 'common' },
                    'pet_ant': { name: '蚂蚁', icon: '🐜', rarity: 'common' },
                    'pet_frog': { name: '青蛙', icon: '🐸', rarity: 'common' },
                    'pet_cat': { name: '猫咪', icon: '🐱', rarity: 'rare' },
                    'pet_dog': { name: '狗狗', icon: '🐶', rarity: 'rare' },
                    'pet_rabbit': { name: '兔子', icon: '🐰', rarity: 'rare' },
                    'pet_wolf': { name: '战狼', icon: '🐺', rarity: 'epic' },
                    'pet_dragon': { name: '幼龙', icon: '🐲', rarity: 'epic' },
                    'pet_phoenix': { name: '凤凰', icon: '🔥', rarity: 'legendary' }
                };
                const pet = petData[equippedPetId];
                if (pet) {
                    const battlePetEl = document.getElementById('battlePet');
                    battlePetEl.textContent = pet.icon;
                    battlePetEl.className = `battle-pet ${pet.rarity}`;
                    battlePetEl.style.display = 'flex';
                    addLog(`🐾 宠物 ${pet.name} 助战！全属性+${petBonus}`, 'system');
                }
            } else {
                document.getElementById('battlePet').style.display = 'none';
            }

            addLog(`战斗开始！难度：${selectedDifficulty.name}，共 ${stageSystem.totalStages} 关`, 'system');

            // 检查玩家NP是否为0
            if (gameState.player.np <= 0) {
                addLog('你的NP不足，跳过回合！', 'system');
                if (checkBothNPZero()) {
                    return;
                }
                setTimeout(() => {
                    gameState.turn = 'enemy';
                    updateTurnIndicator();
                    updateUI();
                    enemyTurn();
                }, 1000);
            } else {
                addLog('你的回合', 'player');
            }
        }

        // 生成技能按钮
        function renderSkillButtons() {
            const container = document.getElementById('skillsContainer');
            container.innerHTML = '';
            
            selectedClass.skills.forEach(skill => {
                const btn = document.createElement('button');
                btn.id = 'btn' + skill.id.charAt(0).toUpperCase() + skill.id.slice(1);
                btn.className = 'skill-btn';
                btn.style.background = `linear-gradient(135deg, ${skill.color} 0%, ${adjustColor(skill.color, -30)} 100%)`;
                btn.style.borderColor = skill.color;
                btn.style.boxShadow = `0 6px 0 ${adjustColor(skill.color, -50)}, 0 8px 20px ${skill.color}66`;
                btn.onclick = () => useSkill(skill.id);
                
                btn.innerHTML = `
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-desc">${skill.description}<br>消耗: ${skill.npCost}NP</div>
                `;
                
                container.appendChild(btn);
            });
            
            // 添加放弃战斗按钮
            const giveupBtn = document.createElement('button');
            giveupBtn.id = 'btnGiveup';
            giveupBtn.className = 'skill-btn skill-giveup';
            giveupBtn.onclick = () => useSkill('giveup');
            giveupBtn.innerHTML = `
                <div class="skill-name">放弃战斗</div>
                <div class="skill-desc">直接结束对局</div>
            `;
            container.appendChild(giveupBtn);
        }

        // 使用技能
        function useSkill(skillId) {
            if (gameState.isProcessing || gameState.turn !== 'player' || gameState.gameOver) {
                return;
            }
            
            // 放弃战斗特殊处理
            if (skillId === 'giveup') {
                gameState.player.hp = 0;
                addLog('你放弃了战斗...', 'system');
                updateUI();
                checkGameOver();
                return;
            }
            
            const skill = selectedClass.skills.find(s => s.id === skillId);
            if (!skill) return;
            
            if (gameState.player.np < skill.npCost) {
                addLog(`NP不足！需要${skill.npCost}点NP`, 'system');
                return;
            }
            
            gameState.isProcessing = true;
            
            const btn = document.getElementById('btn' + skillId.charAt(0).toUpperCase() + skillId.slice(1));
            if (btn) {
                btn.classList.add('clicking');
                setTimeout(() => btn.classList.remove('clicking'), 200);
            }
            
            gameState.player.np -= skill.npCost;
            
            // 播放技能特效
            playPlayerSkillEffect(skillId);
            
            // 计算装备加成后的伤害
            let actualDamage = 0;

            switch (skillId) {
                case 'juejin':
                case 'fireball':
                case 'elementalStorm':
                case 'preciseShot':
                case 'rapidFire':
                case 'shieldBash':
                    actualDamage = getSkillDamage(skill.damage);
                    gameState.enemy.hp = Math.max(0, gameState.enemy.hp - actualDamage);
                    addLog(`你使用了【${skill.name}】，对敌方造成${actualDamage}点伤害！`, 'player');
                    showDamageNumber(actualDamage, 'enemy');

                    // 吸血效果
                    const lifeSteal = getEquippedStat('lifeSteal');
                    if (lifeSteal > 0 && actualDamage > 0) {
                        const stealHp = Math.floor(actualDamage * lifeSteal);
                        if (stealHp > 0) {
                            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + stealHp);
                            addLog(`💉 吸血效果回复${stealHp}点HP！`, 'system');
                            showHealNumber(stealHp, 'player');
                        }
                    }
                    break;

                case 'poisonArrow':
                    actualDamage = getSkillDamage(skill.damage);
                    gameState.enemy.hp = Math.max(0, gameState.enemy.hp - actualDamage);
                    addLog(`你使用了【${skill.name}】，造成${actualDamage}点伤害并附加中毒！下回合敌人受到${skill.poison}点持续伤害`, 'player');
                    showDamageNumber(actualDamage, 'enemy');
                    if (!gameState.enemy.poison) gameState.enemy.poison = 0;
                    gameState.enemy.poison += skill.poison;

                    // 吸血效果
                    const poisonLifeSteal = getEquippedStat('lifeSteal');
                    if (poisonLifeSteal > 0 && actualDamage > 0) {
                        const stealHp = Math.floor(actualDamage * poisonLifeSteal);
                        if (stealHp > 0) {
                            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + stealHp);
                            addLog(`💉 吸血效果回复${stealHp}点HP！`, 'system');
                            showHealNumber(stealHp, 'player');
                        }
                    }
                    break;

                case 'qianlong':
                    gameState.player.invincible = true;
                    document.getElementById('playerAvatar').classList.add('invincible');
                    addLog(`你使用了【${skill.name}】，本回合获得无敌状态！`, 'player');
                    break;

                case 'magicShield':
                    gameState.player.shield += skill.shield;
                    addLog(`你使用了【${skill.name}】，获得${skill.shield}点护盾！`, 'player');
                    break;

                case 'block':
                    gameState.player.damageReduction += skill.damageReduction;
                    addLog(`你使用了【${skill.name}】，下回合获得${skill.damageReduction}点减伤！`, 'player');
                    break;

                case 'jiushi':
                    const jiushiHeal = Math.min(skill.heal, gameState.player.maxHp - gameState.player.hp);
                    gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + skill.heal);
                    addLog(`你使用了【${skill.name}】，回复${jiushiHeal}点HP！`, 'player');
                    showHealNumber(jiushiHeal, 'player');
                    break;

                case 'ironWall':
                    const ironHeal = Math.min(skill.heal, gameState.player.maxHp - gameState.player.hp);
                    gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + skill.heal);
                    gameState.player.shield += skill.shield;
                    addLog(`你使用了【${skill.name}】，回复${ironHeal}点HP并获得${skill.shield}点护盾！`, 'player');
                    if (ironHeal > 0) showHealNumber(ironHeal, 'player');
                    break;
            }

            saveGame();
            updateUI();

            if (checkGameOver()) {
                gameState.isProcessing = false;
                return;
            }

            if (checkBothNPZero()) {
                gameState.isProcessing = false;
                return;
            }

            gameState.turn = 'enemy';
            updateTurnIndicator();
            updateUI();

            setTimeout(() => {
                enemyTurn();
            }, 1000);
        }

        // 获取当前关卡敌人配置
        function getCurrentEnemyConfig() {
            const stage = stageSystem.stages[stageSystem.currentStage];
            if (!stage) return selectedDifficulty;
            return {
                bossAttackMin: stage.attackMin,
                bossAttackMax: stage.attackMax,
                bossHeavyMin: stage.heavyMin,
                bossHeavyMax: stage.heavyMax,
                bossHealMin: stage.healMin,
                bossHealMax: stage.healMax,
                aiBehavior: stage.aiBehavior
            };
        }

        // 敌方回合
        function enemyTurn() {
            document.getElementById('enemyAction').classList.add('show');

            setTimeout(() => {
                // 敌方中毒伤害
                if (gameState.enemy.poison > 0) {
                    const poisonDmg = gameState.enemy.poison;
                    gameState.enemy.hp = Math.max(0, gameState.enemy.hp - poisonDmg);
                    gameState.enemy.poison = 0;
                    addLog(`敌人毒发！受到${poisonDmg}点持续伤害！`, 'system');
                }

                if (checkGameOver()) {
                    document.getElementById('enemyAction').classList.remove('show');
                    updateUI();
                    return;
                }

                if (gameState.enemy.np <= 0) {
                    document.getElementById('enemyAction').classList.remove('show');
                    addLog('敌方NP不足，无法行动！', 'enemy');

                    gameState.player.invincible = false;
                    document.getElementById('playerAvatar').classList.remove('invincible');

                    updateUI();

                    if (checkBothNPZero()) {
                        return;
                    }

                    setTimeout(() => {
                        gameState.turn = 'player';
                        gameState.isProcessing = false;
                        // NP回复装备效果
                        const npRegen = getEquippedStat('npRegen');
                        if (npRegen > 0) {
                            gameState.player.np = Math.min(gameState.player.maxNp, gameState.player.np + npRegen);
                            addLog(`🧤 训练手套效果：回复${npRegen}点NP`, 'system');
                        }
                        updateTurnIndicator();
                        updateUI();
                        addLog('你的回合', 'player');
                    }, 500);
                    return;
                }

                // 使用当前关卡配置
                const enemyConfig = getCurrentEnemyConfig();
                let action;
                const aiBehavior = enemyConfig.aiBehavior;

                if (aiBehavior === 'passive') {
                    // 简单难度
                    if (gameState.enemy.hp < gameState.enemy.maxHp * 0.3 && gameState.enemy.np >= 4) {
                        action = 'heal';
                    } else if (gameState.enemy.np >= 1) {
                        const actions = ['attack', 'attack', 'attack', 'heavy'];
                        action = actions[Math.floor(Math.random() * actions.length)];
                    } else {
                        action = null;
                    }
                } else if (aiBehavior === 'aggressive') {
                    // 困难难度
                    if (gameState.enemy.np >= 4) {
                        if (gameState.enemy.hp < gameState.enemy.maxHp * 0.4) {
                            action = Math.random() > 0.3 ? 'heal' : 'heavy';
                        } else {
                            action = Math.random() > 0.2 ? 'heavy' : 'attack';
                        }
                    } else if (gameState.enemy.np >= 2) {
                        action = 'heavy';
                    } else if (gameState.enemy.np >= 1) {
                        action = 'attack';
                    } else {
                        action = null;
                    }
                } else {
                    // 普通难度
                    if (gameState.enemy.np >= 4) {
                        const actions = ['attack', 'heavy', 'heal'];
                        action = actions[Math.floor(Math.random() * actions.length)];
                    } else if (gameState.enemy.np >= 2) {
                        action = Math.random() > 0.5 ? 'attack' : 'heavy';
                    } else if (gameState.enemy.np >= 1) {
                        action = 'attack';
                    } else {
                        action = null;
                    }
                }

                if (action) {
                    // 播放敌方技能特效
                    playEnemySkillEffect(action);

                    switch (action) {
                        case 'attack':
                            gameState.enemy.np = Math.max(0, gameState.enemy.np - 1);
                            if (gameState.player.invincible) {
                                addLog('敌方消耗1NP发动攻击，但你处于无敌状态！', 'enemy');
                                showDamageNumber(0, 'player');
                            } else {
                                let damage = Math.floor(Math.random() * (enemyConfig.bossAttackMax - enemyConfig.bossAttackMin + 1)) + enemyConfig.bossAttackMin;

                                // 闪避判定
                                const dodgeRate = getEquippedStat('dodgeRate');
                                if (dodgeRate > 0 && Math.random() < dodgeRate) {
                                    addLog('⚡ 你闪避了敌人的攻击！', 'system');
                                    damage = 0;
                                }

                                if (gameState.player.damageReduction > 0) {
                                    damage = Math.max(0, damage - gameState.player.damageReduction);
                                    addLog(`格挡减少了${gameState.player.damageReduction}点伤害！`, 'system');
                                }

                                if (gameState.player.shield > 0) {
                                    const shieldAbsorb = Math.min(damage, gameState.player.shield);
                                    damage -= shieldAbsorb;
                                    gameState.player.shield -= shieldAbsorb;
                                    if (shieldAbsorb > 0) {
                                        addLog(`护盾吸收了${shieldAbsorb}点伤害！`, 'system');
                                    }
                                }

                                gameState.player.hp = Math.max(0, gameState.player.hp - damage);
                                addLog(`敌方消耗1NP发动攻击，对你造成${damage}点伤害！`, 'enemy');
                                if (damage > 0) showDamageNumber(damage, 'player');
                            }
                            break;

                        case 'heavy':
                            gameState.enemy.np = Math.max(0, gameState.enemy.np - 2);
                            if (gameState.player.invincible) {
                                addLog('敌方消耗2NP发动重击，但你处于无敌状态！', 'enemy');
                                showDamageNumber(0, 'player');
                            } else {
                                let damage = Math.floor(Math.random() * (enemyConfig.bossHeavyMax - enemyConfig.bossHeavyMin + 1)) + enemyConfig.bossHeavyMin;

                                // 闪避判定
                                const dodgeRate = getEquippedStat('dodgeRate');
                                if (dodgeRate > 0 && Math.random() < dodgeRate) {
                                    addLog('⚡ 你闪避了敌人的重击！', 'system');
                                    damage = 0;
                                }

                                if (gameState.player.damageReduction > 0) {
                                    damage = Math.max(0, damage - gameState.player.damageReduction);
                                    addLog(`格挡减少了${gameState.player.damageReduction}点伤害！`, 'system');
                                }

                                if (gameState.player.shield > 0) {
                                    const shieldAbsorb = Math.min(damage, gameState.player.shield);
                                    damage -= shieldAbsorb;
                                    gameState.player.shield -= shieldAbsorb;
                                    if (shieldAbsorb > 0) {
                                        addLog(`护盾吸收了${shieldAbsorb}点伤害！`, 'system');
                                    }
                                }

                                gameState.player.hp = Math.max(0, gameState.player.hp - damage);
                                addLog(`敌方消耗2NP发动重击，对你造成${damage}点伤害！`, 'enemy');
                                if (damage > 0) showDamageNumber(damage, 'player');
                            }
                            break;

                        case 'heal':
                            gameState.enemy.np = Math.max(0, gameState.enemy.np - 4);
                            const heal = Math.floor(Math.random() * (enemyConfig.bossHealMax - enemyConfig.bossHealMin + 1)) + enemyConfig.bossHealMin;
                            gameState.enemy.hp = Math.min(gameState.enemy.maxHp, gameState.enemy.hp + heal);
                            addLog(`敌方消耗4NP回复了${heal}点HP！`, 'enemy');
                            showHealNumber(heal, 'enemy');
                            break;
                    }
                }
                
                document.getElementById('enemyAction').classList.remove('show');
                
                gameState.player.invincible = false;
                document.getElementById('playerAvatar').classList.remove('invincible');
                gameState.player.damageReduction = 0;
                
                updateUI();
                
                if (checkGameOver()) {
                    gameState.isProcessing = false;
                    return;
                }
                
                if (checkBothNPZero()) {
                    return;
                }
                
                setTimeout(() => {
                    if (gameState.player.np <= 0) {
                        gameState.turn = 'player';
                        gameState.isProcessing = false;
                        updateTurnIndicator();
                        updateUI();
                        addLog('你的NP不足，跳过回合！', 'system');
                        
                        if (checkBothNPZero()) {
                            return;
                        }
                        
                        setTimeout(() => {
                            gameState.turn = 'enemy';
                            updateTurnIndicator();
                            updateUI();
                            enemyTurn();
                        }, 1000);
                    } else {
                        gameState.turn = 'player';
                        gameState.isProcessing = false;
                        // NP回复装备效果
                        const npRegen2 = getEquippedStat('npRegen');
                        if (npRegen2 > 0) {
                            gameState.player.np = Math.min(gameState.player.maxNp, gameState.player.np + npRegen2);
                            addLog(`🧤 训练手套效果：回复${npRegen2}点NP`, 'system');
                        }
                        updateTurnIndicator();
                        updateUI();
                        addLog('你的回合', 'player');
                    }
                }, 500);
            }, 1500);
        }

        // 检查双方NP是否都为0
        function checkBothNPZero() {
            if (gameState.player.np <= 0 && gameState.enemy.np <= 0) {
                gameState.gameOver = true;
                addLog('双方NP都已耗尽！', 'system');
                
                if (gameState.player.hp > gameState.enemy.hp) {
                    addLog(`我方HP(${gameState.player.hp}) > 敌方HP(${gameState.enemy.hp})，你获胜了！`, 'system');
                    showGameOver(true);
                } else if (gameState.player.hp < gameState.enemy.hp) {
                    addLog(`我方HP(${gameState.player.hp}) < 敌方HP(${gameState.enemy.hp})，你失败了...`, 'system');
                    showGameOver(false);
                } else {
                    addLog(`双方HP相同(${gameState.player.hp})，平局！`, 'system');
                    showGameOver(false);
                }
                return true;
            }
            return false;
        }

        // ==================== 技能特效系统 ====================
        function getEffectContainer() {
            let container = document.getElementById('skillEffectContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'skillEffectContainer';
                container.className = 'skill-effect-container';
                document.body.appendChild(container);
            }
            return container;
        }

        function createEffectElement(className, x, y, duration = 1000) {
            const container = getEffectContainer();
            const el = document.createElement('div');
            el.className = className;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            container.appendChild(el);
            setTimeout(() => {
                if (el.parentNode) el.parentNode.removeChild(el);
            }, duration);
            return el;
        }

        function createParticles(x, y, count, color, spread = 100) {
            const container = getEffectContainer();
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.width = (3 + Math.random() * 5) + 'px';
                p.style.height = p.style.width;
                p.style.background = color;
                p.style.boxShadow = `0 0 ${4 + Math.random() * 8}px ${color}`;
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                const dist = 30 + Math.random() * spread;
                p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
                container.appendChild(p);
                setTimeout(() => {
                    if (p.parentNode) p.parentNode.removeChild(p);
                }, 800);
            }
        }

        function screenShake() {
            document.body.classList.add('screen-shake');
            setTimeout(() => document.body.classList.remove('screen-shake'), 300);
        }

        function hitFlash(target) {
            const el = target === 'player' 
                ? document.querySelector('.left-panel') 
                : document.querySelector('.right-panel');
            if (el) {
                el.classList.add('hit-flash');
                setTimeout(() => el.classList.remove('hit-flash'), 200);
            }
        }

        function addLog(message, type) {
            const log = document.getElementById('battleLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = message;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;

        function updateTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            if (gameState.turn === 'player') {
                indicator.textContent = '你的回合';
                indicator.className = 'turn-indicator player-turn';
            } else {
                indicator.textContent = '敌方回合';
                indicator.className = 'turn-indicator enemy-turn';
            }
        }

        function updateUI() {
            const playerHpPercent = (gameState.player.hp / gameState.player.maxHp) * 100;
            document.getElementById('playerHpBar').style.width = playerHpPercent + '%';
            document.getElementById('playerHpText').textContent = `${gameState.player.hp}/${gameState.player.maxHp} HP`;
            document.getElementById('playerNpText').textContent = `NP: ${gameState.player.np}`;
            
            const enemyHpPercent = (gameState.enemy.hp / gameState.enemy.maxHp) * 100;
            document.getElementById('enemyHpBar').style.width = enemyHpPercent + '%';
            document.getElementById('enemyHpText').textContent = `${gameState.enemy.hp}/${gameState.enemy.maxHp} HP`;
            document.getElementById('enemyNpText').textContent = `NP: ${gameState.enemy.np}`;
            
            const shieldIndicator = document.getElementById('shieldIndicator');
            if (gameState.player.shield > 0) {
                shieldIndicator.style.display = 'block';
                shieldIndicator.textContent = `护盾: ${gameState.player.shield}`;
            } else {
                shieldIndicator.style.display = 'none';
            }
            
            const defenseIndicator = document.getElementById('defenseIndicator');
            if (gameState.player.damageReduction > 0) {
                defenseIndicator.style.display = 'block';
                defenseIndicator.textContent = `减伤: ${gameState.player.damageReduction}`;
            } else {
                defenseIndicator.style.display = 'none';
            }
            
            const isPlayerTurn = gameState.turn === 'player' && !gameState.isProcessing && !gameState.gameOver;
            
            selectedClass.skills.forEach(skill => {
                const btn = document.getElementById('btn' + skill.id.charAt(0).toUpperCase() + skill.id.slice(1));
                if (btn) {
                    let disabled = !isPlayerTurn || gameState.player.np < skill.npCost;
                    if (skill.type === 'heal' && skill.heal) {
                        disabled = disabled || gameState.player.hp >= gameState.player.maxHp;
                    }
                    btn.disabled = disabled;
                }
            });
            
            const giveupBtn = document.getElementById('btnGiveup');
            if (giveupBtn) {
                giveupBtn.disabled = !isPlayerTurn;
            }
        }

        function checkGameOver() {
            if (gameState.player.hp <= 0) {
                // 检查凤凰之羽复活
                const hasRevive = stageSystem.equippedItems.some(e => e.id === 'phoenix_feather');
                if (hasRevive && !gameState.player.hasRevived) {
                    gameState.player.hasRevived = true;
                    const reviveHp = Math.floor(gameState.player.maxHp * 0.3);
                    gameState.player.hp = reviveHp;
                    addLog('🪶 凤凰之羽触发！你复活了！', 'system');
                    updateUI();
                    return false;
                }
                gameState.gameOver = true;
                showGameOver(false);
                return true;
            }
            if (gameState.enemy.hp <= 0) {
                // 检查是否是Boss关（最后一关）
                if (stageSystem.isBossStage) {
                    gameState.gameOver = true;
                    // 触发成就检查
                    checkAndUnlockAchievements(true);
                    showGameOver(true);
                } else {
                    // 非Boss关，进入下一关
                    gameState.isProcessing = true;
                    addLog('敌人被击败了！', 'system');
                    setTimeout(() => {
                        nextStage();
                    }, 800);
                }
                return true;
            }
            return false;
        }

        function checkAndUnlockAchievements(victory) {
            if (!victory || !currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (!users[currentUser]) return;
            
            const userAchievements = users[currentUser].achievements || { earned: [], progress: {}, newlyUnlocked: 0 };
            let newlyUnlocked = [];
            
            // 首胜成就
            if (!userAchievements.earned.includes('first_victory')) {
                userAchievements.earned.push('first_victory');
                newlyUnlocked.push('first_victory');
            }
            
            // 难度成就
            const diffAchievementMap = {
                'easy': 'defeat_easy',
                'normal': 'defeat_normal',
                'hard': 'defeat_hard'
            };
            
            const difficultyId = selectedDifficulty ? selectedDifficulty.id : null;
            if (difficultyId && diffAchievementMap[difficultyId]) {
                const achId = diffAchievementMap[difficultyId];
                if (!userAchievements.earned.includes(achId)) {
                    userAchievements.earned.push(achId);
                    newlyUnlocked.push(achId);
                }
            }
            
            // 职业成就
            const classAchievementMap = {
                'samurai': 'master_samurai',
                'mage': 'master_mage',
                'archer': 'master_archer',
                'guardian': 'master_guardian'
            };
            
            const classId = selectedClass ? selectedClass.id : null;
            if (classId && classAchievementMap[classId]) {
                const achId = classAchievementMap[classId];
                if (!userAchievements.earned.includes(achId)) {
                    userAchievements.earned.push(achId);
                    newlyUnlocked.push(achId);
                }
            }
            
            // 检查全能战士成就
            const hasEasy = userAchievements.earned.includes('defeat_easy');
            const hasNormal = userAchievements.earned.includes('defeat_normal');
            const hasHard = userAchievements.earned.includes('defeat_hard');

            if (hasEasy && hasNormal && hasHard && !userAchievements.earned.includes('all_difficulties')) {
                userAchievements.earned.push('all_difficulties');
                newlyUnlocked.push('all_difficulties');
            }

            // 检查完美胜利成就（满血）
            if (gameState.player.hp >= gameState.player.maxHp && !userAchievements.earned.includes('perfect_victory')) {
                userAchievements.earned.push('perfect_victory');
                newlyUnlocked.push('perfect_victory');
            }

            // 保存当局获取的武器到图鉴
            saveWeaponsToCollection();

            // 发放货币奖励
            giveBattleReward();

            // 更新累计货币成就进度
            updateCurrencyAchievements(users[currentUser]);

            // 更新连胜成就
            updateVictoryStreakAchievement(true, users[currentUser]);

            if (newlyUnlocked.length > 0) {
                userAchievements.newlyUnlocked = (userAchievements.newlyUnlocked || 0) + newlyUnlocked.length;
                if (!userAchievements.unlockTimes) userAchievements.unlockTimes = {};
                newlyUnlocked.forEach(id => {
                    userAchievements.unlockTimes[id] = new Date().toISOString();
                });

                users[currentUser].achievements = userAchievements;
                localStorage.setItem('vsFateUsers', JSON.stringify(users));

                // 显示解锁提示
                showAchievementUnlockNotice(newlyUnlocked);
            }
        }

        // 更新货币类成就
        function updateCurrencyAchievements(userData) {
            if (!userData.achievements) userData.achievements = { earned: [], progress: {}, newlyUnlocked: 0 };
            const earned = userData.achievements.earned;
            const currency = userData.currency || { gold: 0, diamond: 0 };

            // 金币成就
            if (currency.gold >= 1000 && !earned.includes('rich_gold_1000')) {
                earned.push('rich_gold_1000');
            }
            if (currency.gold >= 10000 && !earned.includes('rich_gold_10000')) {
                earned.push('rich_gold_10000');
            }

            // 钻石成就
            if (currency.diamond >= 100 && !earned.includes('diamond_collector_100')) {
                earned.push('diamond_collector_100');
            }
            if (currency.diamond >= 500 && !earned.includes('diamond_collector_500')) {
                earned.push('diamond_collector_500');
            }
        }

        // 更新连胜成就
        function updateVictoryStreakAchievement(victory, userData) {
            if (!userData.achievements) userData.achievements = { earned: [], progress: {}, newlyUnlocked: 0 };
            if (!userData.achievements.progress) userData.achievements.progress = {};

            if (victory) {
                userData.achievements.progress.victoryStreak = (userData.achievements.progress.victoryStreak || 0) + 1;
                if (userData.achievements.progress.victoryStreak >= 3 && !userData.achievements.earned.includes('victory_streak_3')) {
                    userData.achievements.earned.push('victory_streak_3');
                }
            } else {
                userData.achievements.progress.victoryStreak = 0;
            }
        }

        // 保存当局获取的武器到图鉴
        function saveWeaponsToCollection() {
            if (!currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (!users[currentUser]) return;
            
            if (!users[currentUser].weaponCollection) {
                users[currentUser].weaponCollection = [];
            }
            
            const collection = users[currentUser].weaponCollection;
            let newWeapons = [];
            
            stageSystem.equippedItems.forEach(equip => {
                if (!collection.includes(equip.id)) {
                    collection.push(equip.id);
                    newWeapons.push(equip);
                }
            });
            
            if (newWeapons.length > 0) {
                localStorage.setItem('vsFateUsers', JSON.stringify(users));
                addLog(`📖 新武器已收录到图鉴：${newWeapons.map(w => w.name).join('、')}`, 'system');
            }
        }

        // 发放战斗奖励并显示结算界面
        function giveBattleReward() {
            if (!currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (!users[currentUser]) return;
            
            if (!users[currentUser].currency) {
                users[currentUser].currency = { gold: 0, diamond: 0, chest: 0 };
            }
            
            const currency = users[currentUser].currency;
            const difficultyId = selectedDifficulty ? selectedDifficulty.id : 'normal';
            
            let goldReward = 0;
            let chestChance = 0;
            let gotChest = false;
            
            switch (difficultyId) {
                case 'easy':
                    goldReward = 100;
                    chestChance = 0.10;
                    break;
                case 'normal':
                    goldReward = 150;
                    chestChance = 0.15;
                    break;
                case 'hard':
                    goldReward = 200;
                    chestChance = 0.20;
                    break;
            }
            
            currency.gold = (currency.gold || 0) + goldReward;
            
            // 宝箱判定 - 直接存入背包作为消耗品
            if (Math.random() < chestChance) {
                gotChest = true;
                // 添加宝箱到背包
                if (!users[currentUser].inventory) users[currentUser].inventory = [];
                users[currentUser].inventory.push({
                    id: 'chest_item',
                    name: '神秘宝箱',
                    icon: '📦',
                    rarity: 'epic',
                    color: '#a855f7',
                    price: 0,
                    priceType: 'gold',
                    description: '开启可获得8-20钻石',
                    effect: '开启获得随机钻石',
                    stats: { chest: true },
                    instanceId: Date.now() + Math.random().toString(36).substr(2, 9),
                    equipped: false
                });
            }
            
            localStorage.setItem('vsFateUsers', JSON.stringify(users));
            
            // 显示结算界面
            showRewardScreen(goldReward, gotChest);
        }

        // 显示战斗结算界面
        function showRewardScreen(goldReward, gotChest) {
            const overlay = document.getElementById('rewardOverlay');
            const itemsContainer = document.getElementById('rewardItems');
            
            let html = `
                <div class="reward-item">
                    <span class="reward-item-icon">🪙</span>
                    <div class="reward-item-info">
                        <div class="reward-item-name">${goldReward} 金币</div>
                        <div class="reward-item-desc">战斗胜利奖励</div>
                    </div>
                </div>
            `;
            
            if (gotChest) {
                html += `
                    <div class="reward-item">
                        <span class="reward-item-icon reward-chest-animation">📦</span>
                        <div class="reward-item-info">
                            <div class="reward-item-name">神秘宝箱</div>
                            <div class="reward-item-desc">已存入背包，可在背包中开启</div>
                        </div>
                    </div>
                `;
            }
            
            itemsContainer.innerHTML = html;
            overlay.classList.add('show');
        }

        // 关闭结算界面并显示游戏结束界面
        function closeRewardAndShowGameOver() {
            document.getElementById('rewardOverlay').classList.remove('show');
            // 显示原游戏结束界面
            const modal = document.getElementById('gameOverModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            title.textContent = '胜利!';
            title.className = 'modal-title victory';
            content.className = 'modal-content victory';
            modal.classList.add('show');
        }

        function showAchievementUnlockNotice(achievementIds) {
            const achievementNames = {
                'first_victory': { name: '首胜', icon: '🎯' },
                'defeat_easy': { name: '初出茅庐', icon: '🥉' },
                'defeat_normal': { name: '勇者之路', icon: '🥈' },
                'defeat_hard': { name: '传奇征服者', icon: '🥇' },
                'all_difficulties': { name: '全能战士', icon: '👑' },
                'master_samurai': { name: '剑圣', icon: '⚔️' },
                'master_mage': { name: '大魔导师', icon: '🔮' },
                'master_archer': { name: '神射手', icon: '🏹' },
                'master_guardian': { name: '不朽盾墙', icon: '🛡️' }
            };
            
            achievementIds.forEach((id, index) => {
                setTimeout(() => {
                    const ach = achievementNames[id];
                    if (ach) {
                        const notice = document.createElement('div');
                        notice.style.cssText = `
                            position: fixed;
                            top: ${20 + index * 100}px;
                            left: 50%;
                            transform: translateX(-50%) scale(0);
                            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                            border: 2px solid #ffd700;
                            border-radius: 15px;
                            padding: 20px 40px;
                            text-align: center;
                            z-index: 2000;
                            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
                            animation: unlockNoticePop 0.5s ease forwards, unlockNoticeFade 0.5s ease 2.5s forwards;
                            pointer-events: none;
                        `;
                        notice.innerHTML = `
                            <div style="font-size: 40px; margin-bottom: 10px;">${ach.icon}</div>
                            <div style="color: #ffd700; font-size: 18px; font-weight: bold; margin-bottom: 5px;">🏆 成就解锁！</div>
                            <div style="color: #fff; font-size: 16px; font-weight: bold;">${ach.name}</div>
                        `;
                        document.body.appendChild(notice);
                        
                        setTimeout(() => {
                            if (notice.parentNode) notice.parentNode.removeChild(notice);
                        }, 3000);
                    }
                }, index * 500);
            });
            
            // 添加CSS动画
            if (!document.getElementById('achievementAnimStyle')) {
                const style = document.createElement('style');
                style.id = 'achievementAnimStyle';
                style.textContent = `
                    @keyframes unlockNoticePop {
                        0% { transform: translateX(-50%) scale(0); opacity: 0; }
                        50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
                        100% { transform: translateX(-50%) scale(1); opacity: 1; }
                    }
                    @keyframes unlockNoticeFade {
                        0% { transform: translateX(-50%) scale(1); opacity: 1; }
                        100% { transform: translateX(-50%) scale(0.8); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        function showGameOver(victory) {
            const modal = document.getElementById('gameOverModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            
            if (victory) {
                title.textContent = '胜利!';
                title.className = 'modal-title victory';
                content.className = 'modal-content victory';
            } else {
                title.textContent = '失败...';
                title.className = 'modal-title defeat';
                content.className = 'modal-content defeat';
            }
            
            modal.classList.add('show');
        }

        function saveGame() {
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (currentUser && users[currentUser]) {
                users[currentUser].gameData = {
                    playerHp: gameState.player.hp,
                    playerNp: gameState.player.np,
                    selectedClass: selectedClass.id,
                    selectedDifficulty: selectedDifficulty.id,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('vsFateUsers', JSON.stringify(users));
            }
            
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2000);
        }

        function restartGame() {
            // 重置游戏状态
            gameState = {
                player: {
                    hp: selectedClass.hp,
                    maxHp: selectedClass.maxHp,
                    np: selectedClass.np,
                    maxNp: selectedClass.maxNp,
                    invincible: false,
                    shield: 0,
                    damageReduction: 0,
                    hasRevived: false
                },
                enemy: {
                    hp: 0,
                    maxHp: 0,
                    np: 0,
                    maxNp: 0,
                    poison: 0
                },
                turn: 'player',
                gameOver: false,
                isProcessing: false
            };

            // 重置关卡系统
            stageSystem.equippedItems = [];
            stageSystem.currentStage = 0;

            document.getElementById('gameOverModal').classList.remove('show');
            document.getElementById('battleLog').innerHTML = '';
            document.getElementById('playerAvatar').classList.remove('invincible');
            document.getElementById('equippedItems').innerHTML = '';

            // 重新初始化关卡
            initStageSystem();
            loadCurrentStage();

            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (currentUser && users[currentUser]) {
                users[currentUser].gameData = {
                    playerHp: selectedClass.hp,
                    playerNp: selectedClass.np,
                    selectedClass: selectedClass.id,
                    selectedDifficulty: selectedDifficulty.id
                };
                localStorage.setItem('vsFateUsers', JSON.stringify(users));
            }

            updateUI();
            addLog('战斗重新开始！', 'system');
            addLog(`难度：${selectedDifficulty.name}，共 ${stageSystem.totalStages} 关`, 'system');
            addLog('你的回合', 'player');
        }

        function loadGame() {
            const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
            if (currentUser && users[currentUser] && users[currentUser].gameData) {
                try {
                    const saved = users[currentUser].gameData;
                    const savedClass = CLASSES[saved.selectedClass || selectedClass.id];
                    const savedDifficulty = DIFFICULTIES[saved.selectedDifficulty || selectedDifficulty.id];
                    
                    selectedClass = savedClass;
                    selectedDifficulty = savedDifficulty;
                    document.getElementById('playerAvatarIcon').textContent = selectedClass.icon;
                    
                    gameState.player.hp = saved.playerHp || selectedClass.hp;
                    gameState.player.np = saved.playerNp || selectedClass.np;
                    gameState.player.maxHp = selectedClass.maxHp;
                    gameState.player.maxNp = selectedClass.maxNp;
                    gameState.player.invincible = false;
                    gameState.player.shield = 0;
                    gameState.player.damageReduction = 0;
                    gameState.enemy.hp = selectedDifficulty.bossHp;
                    gameState.enemy.maxHp = selectedDifficulty.bossMaxHp;
                    gameState.enemy.np = selectedDifficulty.bossNp;
                    gameState.enemy.maxNp = selectedDifficulty.bossMaxNp;
                    gameState.enemy.poison = 0;
                    gameState.turn = 'player';
                    gameState.gameOver = false;
                    gameState.isProcessing = false;
                    
                    renderSkillButtons();
                    document.getElementById('gameOverModal').classList.remove('show');
                    document.getElementById('battleLog').innerHTML = '';
                    document.getElementById('playerAvatar').classList.remove('invincible');
                    
                    updateUI();
                    addLog('读取存档成功！', 'system');
                    addLog('你的回合', 'player');
                } catch (e) {
                    console.error('读取存档失败:', e);
                    restartGame();
                }
            } else {
                restartGame();
            }
        }

        function backToMainMenu() {
            window.location.href = 'login.html#mainmenu';
        }

        function adjustColor(color, amount) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + amount));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00ff) + amount));
            const b = Math.max(0, Math.min(255, (num & 0x0000ff) + amount));
            return `#${(0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1)}`;
        }

        // 页面加载完成后初始化游戏
        window.onload = initGame;
    </script>
</body>
</html>
