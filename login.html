<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS FATE - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      overflow: hidden;
      background: #000;
    }

    .cover-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cover-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('封面.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 1;
    }

    .button-container {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 80px;
      z-index: 100;
    }

    .game-btn {
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      min-width: 140px;
    }

    .game-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .game-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-login {
      background: linear-gradient(135deg, #f5f5f5 0%, #d4d4d4 100%);
      color: #333;
      border: 3px solid #b8860b;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #ffffff 0%, #e8e8e8 100%);
    }

    .btn-start {
      background: linear-gradient(135deg, #d4a84b 0%, #b8860b 100%);
      color: #fff;
      border: 3px solid #ffd700;
      font-size: 28px;
      padding: 18px 50px;
    }

    .btn-start:hover {
      background: linear-gradient(135deg, #e0b85c 0%, #c9971c 100%);
    }

    .btn-exit {
      background: linear-gradient(135deg, #f5f5f5 0%, #d4d4d4 100%);
      color: #333;
      border: 3px solid #b8860b;
    }

    .btn-exit:hover {
      background: linear-gradient(135deg, #ff6b6b 0%, #c94c4c 100%);
      color: #fff;
    }

    .btn-achievement {
      background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
      color: #fff;
      border: 3px solid #ffd700;
      position: relative;
      overflow: hidden;
    }

    .btn-achievement::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 30%,
        rgba(255, 255, 255, 0.3) 50%,
        transparent 70%
      );
      animation: achievementShine 3s ease-in-out infinite;
    }

    @keyframes achievementShine {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    .btn-achievement:hover {
      background: linear-gradient(135deg, #ffe44d 0%, #d4a84b 100%);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
    }

    .btn-encyclopedia {
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
      color: #fff;
      border: 3px solid #8b5cf6;
    }

    .btn-encyclopedia:hover {
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
    }

    .achievement-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ef4444;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 10px;
      border: 2px solid #fff;
      z-index: 10;
      animation: badgePulse 2s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .login-modal {
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      padding: 40px 50px;
      border-radius: 20px;
      border: 3px solid #b8860b;
      box-shadow: 0 0 50px rgba(184,134,11,0.5);
      width: 400px;
      animation: modalPop 0.3s ease;
    }

    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-title {
      color: #d4a84b;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 20px rgba(212,168,75,0.5);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      color: #ccc;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      font-size: 16px;
      border: 2px solid #555;
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #d4a84b;
      box-shadow: 0 0 10px rgba(212,168,75,0.3);
    }

    .modal-buttons {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #d4a84b 0%, #b8860b 100%);
      color: #fff;
    }

    .btn-confirm:hover {
      background: linear-gradient(135deg, #e0b85c 0%, #c9971c 100%);
    }

    .btn-cancel {
      background: linear-gradient(135deg, #666 0%, #444 100%);
      color: #fff;
    }

    .btn-cancel:hover {
      background: linear-gradient(135deg, #777 0%, #555 100%);
    }

    .btn-switch {
      background: transparent;
      color: #d4a84b;
      border: 2px solid #d4a84b;
    }

    .btn-switch:hover {
      background: rgba(212,168,75,0.1);
    }

    .error-message {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    .success-message {
      color: #4ade80;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    .tip-message {
      position: absolute;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      z-index: 100;
      text-align: center;
    }

    /* 职业选择页面样式 */
    .class-select-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      z-index: 2;
    }

    .class-select-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(107, 92, 231, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(201, 76, 76, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
    }

    .class-select-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
      max-width: 1400px;
      width: 100%;
    }

    .class-select-title {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      margin-bottom: 10px;
      letter-spacing: 5px;
    }

    .class-select-subtitle {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 50px;
    }

    .class-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      margin-bottom: 40px;
    }

    .class-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px 20px;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .class-card:hover {
      transform: translateY(-10px);
      border-color: var(--class-color, #b8860b);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(0, 0, 0, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    .class-icon {
      font-size: 60px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
    }

    .class-name {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
    }

    .class-description {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 15px;
    }

    .class-stats {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
    }

    .stat-value.hp {
      color: #ff6b6b;
    }

    .stat-value.np {
      color: #4a90d9;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .skill-tag {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* 难度选择页面样式 */
    .difficulty-select-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      z-index: 2;
    }

    .difficulty-select-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(234, 179, 8, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.1) 0%, transparent 50%);
    }

    .difficulty-select-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
      max-width: 1200px;
      width: 100%;
    }

    .difficulty-select-title {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      margin-bottom: 10px;
      letter-spacing: 5px;
    }

    .difficulty-select-subtitle {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 50px;
    }

    .difficulty-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      margin-bottom: 40px;
    }

    .difficulty-card {
      background: rgba(255, 255, 255, 0.05);
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px 25px;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .difficulty-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .difficulty-card.easy::before {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }

    .difficulty-card.normal::before {
      background: linear-gradient(90deg, #eab308, #facc15);
    }

    .difficulty-card.hard::before {
      background: linear-gradient(90deg, #ef4444, #f87171);
    }

    .difficulty-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.08);
    }

    .difficulty-card:hover::before {
      opacity: 1;
    }

    .difficulty-card.easy:hover {
      border-color: #22c55e;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(34, 197, 94, 0.2);
    }

    .difficulty-card.normal:hover {
      border-color: #eab308;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(234, 179, 8, 0.2);
    }

    .difficulty-card.hard:hover {
      border-color: #ef4444;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(239, 68, 68, 0.2);
    }

    .difficulty-icon {
      font-size: 60px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
    }

    .difficulty-name {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
    }

    .difficulty-card.easy .difficulty-name {
      color: #4ade80;
    }

    .difficulty-card.normal .difficulty-name {
      color: #facc15;
    }

    .difficulty-card.hard .difficulty-name {
      color: #f87171;
    }

    .difficulty-description {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 15px;
    }

    .difficulty-stats {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      margin: 15px 0;
      padding: 15px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .difficulty-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }

    .difficulty-stat .stat-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .difficulty-stat .stat-value {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
    }

    .difficulty-features {
      width: 100%;
      text-align: left;
    }

    .difficulty-features h3 {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .difficulty-features ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .difficulty-features li {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      padding: 5px 0;
      padding-left: 20px;
      position: relative;
    }

    .difficulty-features li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: rgba(255, 255, 255, 0.5);
    }

    .difficulty-card.easy .difficulty-features li::before {
      color: #4ade80;
    }

    .difficulty-card.normal .difficulty-features li::before {
      color: #facc15;
    }

    .difficulty-card.hard .difficulty-features li::before {
      color: #f87171;
    }

    .select-difficulty-btn {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid;
      border-radius: 25px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .difficulty-card.easy .select-difficulty-btn {
      border-color: #22c55e;
    }

    .difficulty-card.easy .select-difficulty-btn:hover {
      background: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
    }

    .difficulty-card.normal .select-difficulty-btn {
      border-color: #eab308;
    }

    .difficulty-card.normal .select-difficulty-btn:hover {
      background: #eab308;
      box-shadow: 0 0 20px rgba(234, 179, 8, 0.5);
    }

    .difficulty-card.hard .select-difficulty-btn {
      border-color: #ef4444;
    }

    .difficulty-card.hard .select-difficulty-btn:hover {
      background: #ef4444;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
    }

    /* 成就系统弹窗样式 */
    .achievement-modal {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 0;
      border-radius: 20px;
      border: 3px solid #b8860b;
      box-shadow: 0 0 50px rgba(184,134,11,0.5);
      width: 900px;
      max-width: 95vw;
      max-height: 90vh;
      animation: modalPop 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .achievement-header {
      background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 100%);
      padding: 25px 30px;
      border-bottom: 2px solid #b8860b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .achievement-header-title {
      color: #d4a84b;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(212,168,75,0.5);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .achievement-header-title .trophy-icon {
      font-size: 36px;
    }

    .achievement-stats {
      display: flex;
      gap: 20px;
      color: #ccc;
      font-size: 14px;
    }

    .achievement-stats span {
      color: #d4a84b;
      font-weight: bold;
    }

    .achievement-close-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .achievement-close-btn:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .achievement-content {
      padding: 30px;
      overflow-y: auto;
      flex: 1;
    }

    .achievement-category {
      margin-bottom: 30px;
    }

    .achievement-category-title {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .achievement-item {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .achievement-item:hover {
      transform: translateY(-5px);
      border-color: rgba(212,168,75,0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .achievement-item.earned {
      border-color: #d4a84b;
      background: linear-gradient(135deg, rgba(212,168,75,0.1) 0%, rgba(184,134,11,0.05) 100%);
    }

    .achievement-item.earned::after {
      content: '✓';
      position: absolute;
      top: 10px;
      right: 10px;
      background: #22c55e;
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    .achievement-item.not-earned {
      opacity: 0.6;
    }

    .achievement-item.not-earned .achievement-icon {
      filter: grayscale(100%);
    }

    .achievement-icon {
      font-size: 48px;
      margin-bottom: 10px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }

    .achievement-icon.tier-1 {
      filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.6));
    }

    .achievement-icon.tier-2 {
      filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.6));
    }

    .achievement-icon.tier-3 {
      filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.8));
      animation: legendaryGlow 2s ease-in-out infinite;
    }

    @keyframes legendaryGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.8)); }
      50% { filter: drop-shadow(0 0 30px rgba(239, 68, 68, 1)); }
    }

    .achievement-name {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .achievement-description {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .achievement-condition {
      color: #d4a84b;
      font-size: 12px;
      font-weight: bold;
      padding: 5px 10px;
      background: rgba(212,168,75,0.1);

    // 解锁成就
    function unlockAchievement(achievementId) {
      const userAchievements = getUserAchievements();
      
      if (userAchievements.earned.includes(achievementId)) {
        return false; // 已解锁
      }
      
      userAchievements.earned.push(achievementId);
      userAchievements.newlyUnlocked = (userAchievements.newlyUnlocked || 0) + 1;
      
      // 记录解锁时间
      if (!userAchievements.unlockTimes) userAchievements.unlockTimes = {};
      userAchievements.unlockTimes[achievementId] = new Date().toISOString();
      
      saveUserAchievements(userAchievements);
      
      // 显示解锁动画
      showUnlockAnimation(achievementId);
      
      return true;
    }

      }, 3500);

    // 检查并解锁相关成就
    function checkAchievements(victory, difficulty, classId) {
      if (!victory || !currentUser) return;
      
      let newlyUnlocked = [];
      
      // 首胜成就
      if (unlockAchievement('first_victory')) {
        newlyUnlocked.push('first_victory');
      }
      
      // 难度成就
      const diffAchievementMap = {
        'easy': 'defeat_easy',
        'normal': 'defeat_normal',
        'hard': 'defeat_hard'
      };
      
      if (difficulty && diffAchievementMap[difficulty]) {
        if (unlockAchievement(diffAchievementMap[difficulty])) {
          newlyUnlocked.push(diffAchievementMap[difficulty]);
        }
      }
      
      // 职业成就
      const classAchievementMap = {
        'samurai': 'master_samurai',
        'mage': 'master_mage',
        'archer': 'master_archer',
        'guardian': 'master_guardian'
      };
      
      if (classId && classAchievementMap[classId]) {
        if (unlockAchievement(classAchievementMap[classId])) {
          newlyUnlocked.push(classAchievementMap[classId]);
        }
      }
      
      // 检查全能战士成就
      const userAchievements = getUserAchievements();
      const hasEasy = userAchievements.earned.includes('defeat_easy');
      const hasNormal = userAchievements.earned.includes('defeat_normal');
      const hasHard = userAchievements.earned.includes('defeat_hard');
      
      if (hasEasy && hasNormal && hasHard) {
        if (unlockAchievement('all_difficulties')) {
          newlyUnlocked.push('all_difficulties');
        }
      }
      
      // 清除新解锁计数（已查看）
      if (newlyUnlocked.length > 0) {
        setTimeout(() => {
          const ach = getUserAchievements();
          ach.newlyUnlocked = 0;
          saveUserAchievements(ach);
          updateAchievementBadge();
        }, 100);
      }
      
      return newlyUnlocked;
    }

    // 处理确认按钮
    function handleConfirm() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username) {
        document.getElementById('errorMsg').textContent = '请输入用户名';
        document.getElementById('successMsg').textContent = '';
        return;
      }

      if (!password) {
        document.getElementById('errorMsg').textContent = '请输入密码';
        document.getElementById('successMsg').textContent = '';
        return;
      }

      if (username.length < 3) {
        document.getElementById('errorMsg').textContent = '用户名至少3个字符';
        document.getElementById('successMsg').textContent = '';
        return;
      }

      if (password.length < 6) {
        document.getElementById('errorMsg').textContent = '密码至少6个字符';
        document.getElementById('successMsg').textContent = '';
        return;
      }

      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');

      if (currentMode === 'login') {
        if (!users[username]) {
          document.getElementById('errorMsg').textContent = '用户名不存在';
          document.getElementById('successMsg').textContent = '';
          return;
        }
        if (users[username].password !== password) {
          document.getElementById('errorMsg').textContent = '密码错误';
          document.getElementById('successMsg').textContent = '';
          return;
        }
      } else {
        if (users[username]) {
          document.getElementById('errorMsg').textContent = '用户名已存在';
          document.getElementById('successMsg').textContent = '';
          return;
        }
        users[username] = {
          password: password,
          createdAt: new Date().toISOString(),
          gameData: {
            playerHp: 50,
            playerNp: 30,
            selectedClass: null,
            selectedDifficulty: null
          }
        };
        localStorage.setItem('vsFateUsers', JSON.stringify(users));
      }

      localStorage.setItem('currentUser', username);
      currentUser = username;
      document.getElementById('successMsg').textContent = '登录成功！';
      setTimeout(() => {
        closeModal();
        showAchievementBtn();
        showMainMenuPage();
      }, 1000);
    }

    // 显示主菜单页面
    function showMainMenuPage() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainMenuPage').classList.remove('hidden');
      document.getElementById('classSelectPage').classList.add('hidden');
      document.getElementById('difficultySelectPage').classList.add('hidden');
      updateCurrencyDisplay();
    }

    // ==================== 货币系统 ====================

    // 获取用户货币数据
    function getUserCurrency() {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser]) return { gold: 0, diamond: 0, chest: 0 };
      return users[currentUser].currency || { gold: 0, diamond: 0, chest: 0 };
    }

    // 保存用户货币数据
    function saveUserCurrency(currency) {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser]) return;
      users[currentUser].currency = currency;
      localStorage.setItem('vsFateUsers', JSON.stringify(users));
    }

    // 获取用户背包中的宝箱数量
    function getUserChestCount() {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser] || !users[currentUser].inventory) return 0;
      return users[currentUser].inventory.filter(item => item.id === 'chest_item' || item.stats?.chest).length;
    }

    // 更新货币显示
    function updateCurrencyDisplay() {
      const currency = getUserCurrency();
      document.getElementById('goldAmount').textContent = currency.gold || 0;
      document.getElementById('diamondAmount').textContent = currency.diamond || 0;
      document.getElementById('shopGoldAmount').textContent = currency.gold || 0;

      // 更新宠物页面的钻石显示
      const petDiamondEl = document.getElementById('petDiamondAmount');
      if (petDiamondEl) {
        petDiamondEl.textContent = currency.diamond || 0;
      }

      // 从背包中统计宝箱数量
      const chestCount = getUserChestCount();
      const chestItem = document.getElementById('chestItem');
      const chestAmount = document.getElementById('chestAmount');
      if (chestCount > 0) {
        chestItem.style.display = 'flex';
        chestAmount.textContent = chestCount;
      } else {
        chestItem.style.display = 'none';
      }
    }

    // 添加货币
    function addCurrency(gold, diamond, chest) {
      const currency = getUserCurrency();
      if (gold) currency.gold = (currency.gold || 0) + gold;
      if (diamond) currency.diamond = (currency.diamond || 0) + diamond;
      if (chest) currency.chest = (currency.chest || 0) + chest;
      saveUserCurrency(currency);
      updateCurrencyDisplay();
    }

    // 消耗货币
    function spendCurrency(gold, diamond) {
      const currency = getUserCurrency();
      if (gold && currency.gold < gold) return false;
      if (diamond && currency.diamond < diamond) return false;
      if (gold) currency.gold -= gold;
      if (diamond) currency.diamond -= diamond;
      saveUserCurrency(currency);
      updateCurrencyDisplay();
      return true;
    }

    // 开启宝箱
    function openChest() {
      const currency = getUserCurrency();
      if (!currency.chest || currency.chest <= 0) {
        alert('你没有宝箱！');
        return;
      }
      currency.chest--;
      const diamondReward = Math.floor(Math.random() * 13) + 8; // 8-20钻石
      currency.diamond = (currency.diamond || 0) + diamondReward;
      saveUserCurrency(currency);
      updateCurrencyDisplay();

      // 显示开启动画
      const anim = document.createElement('div');
      anim.className = 'chest-open-animation';
      anim.innerHTML = `
        <div style="font-size: 60px; margin-bottom: 15px;">📦</div>
        <div style="color: #a855f7; font-size: 24px; font-weight: bold; margin-bottom: 10px;">宝箱开启！</div>
        <div style="color: #fff; font-size: 20px; font-weight: bold; margin-bottom: 5px;">获得 ${diamondReward} 💎 钻石</div>
        <div style="color: rgba(255,255,255,0.6); font-size: 14px;">当前钻石: ${currency.diamond}</div>
      `;
      document.body.appendChild(anim);
      setTimeout(() => {
        if (anim.parentNode) anim.parentNode.removeChild(anim);
      }, 2000);
    }

    // ==================== 货币系统结束 ====================

    // ==================== 商店系统 ====================

    // 显示商店
    function showShopPage() {
      if (!currentUser) {
        alert('请先登录账号');
        return;
      }
      renderShop();
      updateCurrencyDisplay();
      document.getElementById('shopOverlay').classList.add('show');
    }

    // 关闭商店
    function closeShop() {
      document.getElementById('shopOverlay').classList.remove('show');
    }

    // 渲染商店
    function renderShop() {
      const grid = document.getElementById('shopGrid');
      const currency = getUserCurrency();
      let html = '';

      SHOP_ITEMS.forEach(item => {
        const canAfford = currency.gold >= item.price;
        const rarityClass = `rarity-${item.rarity}`;
        const rarityText = { common: '普通', rare: '稀有', epic: '史诗', legendary: '传说' }[item.rarity];

        html += `
          <div class="shop-item" style="--shop-color: ${item.color};">
            <span class="shop-item-icon">${item.icon}</span>
            <div class="shop-item-name">${item.name}</div>
            <div class="weapon-rarity ${rarityClass}">${rarityText}</div>
            <div class="shop-item-effect">${item.effect}</div>
            <div class="shop-item-price">
              <span>🪙</span>
              <span>${item.price}</span>
            </div>
            <button class="shop-buy-btn" onclick="buyItem('${item.id}')" ${!canAfford ? 'disabled' : ''}>
              ${canAfford ? '购买' : '金币不足'}
            </button>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // 购买道具
    function buyItem(itemId) {
      const item = SHOP_ITEMS.find(i => i.id === itemId);
      if (!item) return;

      if (!spendCurrency(item.price, 0)) {
        alert('金币不足！');
        return;
      }

      // 添加到背包
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser].inventory) users[currentUser].inventory = [];
      users[currentUser].inventory.push({
        ...item,
        instanceId: Date.now() + Math.random().toString(36).substr(2, 9),
        equipped: false
      });

      // 检查首次购买道具成就
      if (!users[currentUser].achievements) users[currentUser].achievements = { earned: [], progress: {}, newlyUnlocked: 0 };
      if (!users[currentUser].achievements.earned.includes('first_item')) {
        users[currentUser].achievements.earned.push('first_item');
        users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
      }

      localStorage.setItem('vsFateUsers', JSON.stringify(users));

      alert(`购买成功！${item.name} 已添加到背包`);
      renderShop();
    }

    // ==================== 商店系统结束 ====================

    function showPetPage() {

        alert('请先登录账号');
        return;
      }
      renderPetPage();
      document.getElementById('petOverlay').classList.add('show');
    }

    // 关闭宠物页面
    function closePetPage() {
      document.getElementById('petOverlay').classList.remove('show');
    }

    // 渲染宠物页面
    function renderPetPage() {
      updateCurrencyDisplay();
      const container = document.getElementById('petContainer');
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      const petCollection = users[currentUser]?.petCollection || [];
      const equippedPet = users[currentUser]?.equippedPet || null;

      let html = '';

      // 显示已装备的宠物
      if (equippedPet) {
        const pet = PET_DATA.find(p => p.id === equippedPet);
        if (pet) {
          html += `
            <div style="background: rgba(255,255,255,0.05); border: 2px solid ${pet.color}; border-radius: 15px; padding: 20px; margin-bottom: 30px; text-align: center;">
              <div style="color: #d4a84b; font-size: 18px; font-weight: bold; margin-bottom: 15px;">当前携带的宠物</div>
              <div style="font-size: 60px; margin-bottom: 10px;">${pet.icon}</div>
              <div style="color: #fff; font-size: 22px; font-weight: bold; margin-bottom: 5px;">${pet.name}</div>

            </div>
          `;
        }
      } else {
        html += `
          <div style="background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2); border-radius: 15px; padding: 20px; margin-bottom: 30px; text-align: center; color: rgba(255,255,255,0.5);">
            <div style="font-size: 40px; margin-bottom: 10px;">🐾</div>
            <div style="font-size: 16px;">尚未携带宠物</div>
            <div style="font-size: 13px; margin-top: 5px;">抽卡或选择下方宠物进行携带</div>
          </div>

      // 抽卡区域
      html += `
        <div style="background: rgba(255,255,255,0.05); border: 2px solid #a855f7; border-radius: 15px; padding: 25px; margin-bottom: 30px; text-align: center;">
          <div style="color: #a855f7; font-size: 22px; font-weight: bold; margin-bottom: 15px;">🎲 宠物召唤</div>
          <div style="color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 15px;">
            消耗 10 💎 钻石召唤一只随机宠物<br>
            <span style="font-size: 12px;">普通 35% | 稀有 25% | 史诗 20% | 传说 10%</span>
          </div>
          <button class="shop-buy-btn" onclick="drawPet()" style="background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);">
            🎲 召唤一次 (10💎)
          </button>
        </div>
      `;

      // 已拥有的宠物列表
      if (petCollection.length > 0) {
        html += `<div style="color: #d4a84b; font-size: 18px; font-weight: bold; margin-bottom: 15px; text-align: center;">已拥有的宠物 (${petCollection.length}/10)</div>`;
        html += `<div class="shop-grid">`;
        petCollection.forEach(petId => {
          const pet = PET_DATA.find(p => p.id === petId);
          if (pet) {
            const isEquipped = equippedPet === petId;
            html += `
              <div class="shop-item" style="--shop-color: ${pet.color}; ${isEquipped ? 'border-color: #22c55e; box-shadow: 0 0 15px rgba(34,197,94,0.3);' : ''}">
                <span class="shop-item-icon">${pet.icon}</span>
                <div class="shop-item-name">${pet.name}</div>
                <div class="weapon-rarity rarity-${pet.rarity}" style="font-size: 11px; margin-bottom: 5px;">${pet.description}</div>
                <div class="shop-item-effect">${isEquipped ? '✓ 已携带' : '点击携带'}</div>
                ${!isEquipped ? `<button class="shop-buy-btn" onclick="equipPet('${pet.id}')" style="margin-top: 10px;">携带</button>` : ''}
              </div>
            `;
          }
        });
        html += `</div>`;
      } else {
        html += `<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">还没有宠物，快去召唤吧！</div>`;

    // 抽卡
    function drawPet() {
      const currency = getUserCurrency();
      if (!currency.diamond || currency.diamond < 10) {
        alert('钻石不足！需要 10 💎 钻石');
        return;
      }

      if (!spendCurrency(0, 10)) {
        alert('钻石不足！');
        return;
      }

      // 抽卡概率
      const roll = Math.random();
      let rarity;
      if (roll < 0.10) {
        rarity = 'legendary';
      } else if (roll < 0.30) {
        rarity = 'epic';
      } else if (roll < 0.55) {
        rarity = 'rare';
      } else {
        rarity = 'common';
      }

      // 从对应品质中随机选择一只
      const petsOfRarity = PET_DATA.filter(p => p.rarity === rarity);
      const drawnPet = petsOfRarity[Math.floor(Math.random() * petsOfRarity.length)];

      // 保存到收集
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser].petCollection) users[currentUser].petCollection = [];

      const isNew = !users[currentUser].petCollection.includes(drawnPet.id);
      if (isNew) {
        users[currentUser].petCollection.push(drawnPet.id);
      }

      // 初始化成就数据
      if (!users[currentUser].achievements) users[currentUser].achievements = { earned: [], progress: {}, newlyUnlocked: 0 };
      if (!users[currentUser].achievements.progress) users[currentUser].achievements.progress = {};

      // 检查首次召唤成就
      if (!users[currentUser].achievements.earned.includes('first_gacha')) {
        users[currentUser].achievements.earned.push('first_gacha');
        users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
      }

      // 更新召唤次数
      users[currentUser].achievements.progress.gachaCount = (users[currentUser].achievements.progress.gachaCount || 0) + 1;

      // 检查召唤大师成就（20次）
      if (users[currentUser].achievements.progress.gachaCount >= 20 && !users[currentUser].achievements.earned.includes('gacha_master')) {
        users[currentUser].achievements.earned.push('gacha_master');
        users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
      }

      // 检查首次获得宠物成就
      if (isNew && users[currentUser].petCollection.length === 1 && !users[currentUser].achievements.earned.includes('first_pet')) {
        users[currentUser].achievements.earned.push('first_pet');
        users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
      }

      // 检查宠物收集成就（5只）
      if (isNew && users[currentUser].petCollection.length >= 5 && !users[currentUser].achievements.earned.includes('pet_collector_5')) {
        users[currentUser].achievements.earned.push('pet_collector_5');
        users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
      }

      // 检查宠物大师成就（10只全收集）
      if (isNew && users[currentUser].petCollection.length >= 10 && !users[currentUser].achievements.earned.includes('pet_collector_all')) {
        users[currentUser].achievements.earned.push('pet_collector_all');
        users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
      }

      // 检查传说宠物成就
      if (isNew && rarity === 'legendary' && !users[currentUser].achievements.earned.includes('legendary_pet')) {
        users[currentUser].achievements.earned.push('legendary_pet');
        users[currentUser].achievements.newlyUnlocked = (users[currentUser].achievements.newlyUnlocked || 0) + 1;
      }

      localStorage.setItem('vsFateUsers', JSON.stringify(users));

      // 显示抽卡结果
      const rarityText = { common: '普通', rare: '稀有', epic: '史诗', legendary: '传说' }[rarity];
      const rarityColor = { common: '#888', rare: '#3b82f6', epic: '#a855f7', legendary: '#eab308' }[rarity];

      const resultDiv = document.createElement('div');
      resultDiv.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border: 3px solid ${rarityColor};
        border-radius: 20px;
        padding: 40px 60px;
        text-align: center;
        z-index: 3000;
        box-shadow: 0 0 50px ${rarityColor}80;
        animation: chestPop 0.5s ease forwards;
      `;
      resultDiv.innerHTML = `
        <div style="font-size: 14px; color: ${rarityColor}; font-weight: bold; margin-bottom: 10px;">${rarityText}品质</div>
        <div style="font-size: 80px; margin-bottom: 15px;">${drawnPet.icon}</div>
        <div style="color: #fff; font-size: 28px; font-weight: bold; margin-bottom: 10px;">${drawnPet.name}</div>
        <div style="color: ${rarityColor}; font-size: 16px; margin-bottom: 5px;">${drawnPet.description}</div>
        ${isNew ? '<div style="color: #22c55e; font-size: 14px; font-weight: bold;">✨ 新宠物！</div>' : '<div style="color: rgba(255,255,255,0.5); font-size: 14px;">已拥有，转化为 5 💎</div>'}
      `;
      document.body.appendChild(resultDiv);

      // 如果重复，返还5钻石
      if (!isNew) {
        const users2 = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
        users2[currentUser].currency.diamond += 5;
        localStorage.setItem('vsFateUsers', JSON.stringify(users2));
      }

      setTimeout(() => {
        if (resultDiv.parentNode) resultDiv.parentNode.removeChild(resultDiv);
        updateCurrencyDisplay();
        renderPetPage();
      }, 2500);
    }

    // 携带宠物
    function equipPet(petId) {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser]) return;
      users[currentUser].equippedPet = petId;
      localStorage.setItem('vsFateUsers', JSON.stringify(users));
      alert('宠物已携带！进入战斗即可获得属性加成。');
      renderPetPage();
    }

    // 取消携带宠物
    function unequipPet() {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser]) return;
      delete users[currentUser].equippedPet;
      localStorage.setItem('vsFateUsers', JSON.stringify(users));
      alert('已取消携带宠物。');
      renderPetPage();
    }

    // ==================== 宠物系统结束 ====================

    // ==================== 背包系统 ====================

    // 显示背包
    function showItemPage() {
      if (!currentUser) {
        alert('请先登录账号');
        return;
      }
      currentInventoryFilter = 'all';
      document.querySelectorAll('.inventory-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.inventory-tab')[0].classList.add('active');
      renderInventory();
      document.getElementById('inventoryOverlay').classList.add('show');
    }

    // 关闭背包
    function closeInventory() {
      document.getElementById('inventoryOverlay').classList.remove('show');
    }

    // 筛选背包
    function filterInventory(filter) {
      currentInventoryFilter = filter;
      document.querySelectorAll('.inventory-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderInventory();
    }

    // 获取背包数据
    function getUserInventory() {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser]) return [];
      return users[currentUser].inventory || [];
    }

    // 渲染背包
    function renderInventory() {
      const grid = document.getElementById('inventoryGrid');
      let items = getUserInventory();

      if (currentInventoryFilter === 'equipped') {
        items = items.filter(i => i.equipped);
      }

      if (items.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">背包是空的，去商店购买道具吧！</div>';
        return;
      }

      let html = '';
      items.forEach(item => {
        const equippedClass = item.equipped ? 'equipped' : '';
        const rarityClass = `rarity-${item.rarity}`;
        const isChest = item.id === 'chest_item' || item.stats?.chest;
        const actionText = isChest ? '点击开启' : (item.equipped ? '点击取消携带' : '点击携带');
        const badgeText = isChest ? '' : (item.equipped ? '<div class="inventory-item-badge">已携带</div>' : '');

        html += `
          <div class="inventory-item ${equippedClass}" style="--item-color: ${item.color};" onclick="toggleEquipItem('${item.instanceId}')">
            ${badgeText}
            <span class="inventory-item-icon">${item.icon}</span>
            <div class="inventory-item-name">${item.name}</div>
            <div class="weapon-rarity ${rarityClass}" style="font-size: 10px; margin-bottom: 5px;">${item.effect}</div>
            <div class="inventory-item-desc">${actionText}</div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // 切换道具携带状态或使用道具
    function toggleEquipItem(instanceId) {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      if (!users[currentUser] || !users[currentUser].inventory) return;

      const inventory = users[currentUser].inventory;
      const item = inventory.find(i => i.instanceId === instanceId);
      if (!item) return;

      // 如果是宝箱道具，直接开启
      if (item.id === 'chest_item' || item.stats?.chest) {
        openChestItem(item, users);
        return;
      }

      if (!item.equipped) {
        // 检查是否已满2个
        const equippedCount = inventory.filter(i => i.equipped).length;
        if (equippedCount >= 2) {
          alert('最多只能携带2个道具！请先取消携带一个道具。');
          return;
        }
        item.equipped = true;
        alert(`${item.name} 已携带，可在战斗中使用！`);
      } else {
        item.equipped = false;
        alert(`${item.name} 已取消携带。`);
      }

      localStorage.setItem('vsFateUsers', JSON.stringify(users));
      renderInventory();
    }

    // 开启宝箱道具
    function openChestItem(item, users) {
      if (!confirm(`是否开启 ${item.name}？\n\n开启后可获得 8-20 颗钻石！`)) {
        return;
      }

      // 随机获得8-20钻石
      const diamondReward = Math.floor(Math.random() * 13) + 8;

      // 添加钻石到货币
      if (!users[currentUser].currency) {
        users[currentUser].currency = { gold: 0, diamond: 0, chest: 0 };
      }
      users[currentUser].currency.diamond = (users[currentUser].currency.diamond || 0) + diamondReward;

      // 从背包中移除宝箱
      const idx = users[currentUser].inventory.findIndex(i => i.instanceId === item.instanceId);
      if (idx !== -1) {
        users[currentUser].inventory.splice(idx, 1);
      }

      localStorage.setItem('vsFateUsers', JSON.stringify(users));

      // 显示开启结果
      alert(`🎉 宝箱开启成功！\n\n获得 ${diamondReward} 💎 钻石！\n\n当前钻石: ${users[currentUser].currency.diamond}`);

      // 更新显示
      updateCurrencyDisplay();
      renderInventory();
    }

    // ==================== 背包系统结束 ====================

    // 显示职业选择页面
    function showClassSelectPage() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainMenuPage').classList.add('hidden');
      document.getElementById('classSelectPage').classList.remove('hidden');
      document.getElementById('difficultySelectPage').classList.add('hidden');
      renderClassCards();
    }

    // 显示难度选择页面
    function showDifficultySelectPage() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainMenuPage').classList.add('hidden');
      document.getElementById('classSelectPage').classList.add('hidden');
      document.getElementById('difficultySelectPage').classList.remove('hidden');
      renderDifficultyCards();
    }

    // 渲染职业卡片
    function renderClassCards() {
      const container = document.getElementById('classCardsContainer');
      container.innerHTML = '';

      Object.values(CLASSES).forEach(cls => {
        const card = document.createElement('div');
        card.className = 'class-card';
        card.style.setProperty('--class-color', cls.color);
        card.onclick = () => selectClass(cls.id);

        let skillsHtml = '';
        cls.skills.forEach(skill => {
          skillsHtml += `<div class="skill-tag" style="background-color: ${skill.color}">${skill.name}</div>`;
        });

        card.innerHTML = `
          <div class="class-icon">${cls.icon}</div>
          <h2 class="class-name">${cls.name}</h2>
          <p class="class-description">${cls.description}</p>
          <div class="class-stats">
            <div class="stat">
              <span class="stat-label">HP</span>
              <span class="stat-value hp">${cls.hp}</span>
            </div>
            <div class="stat">
              <span class="stat-label">NP</span>
              <span class="stat-value np">${cls.np}</span>
            </div>
          </div>
          <div class="skill-tags">
            ${skillsHtml}
          </div>
          <button class="modal-btn btn-confirm">选择此职业</button>
        `;

        container.appendChild(card);
      });
    }

    // 渲染难度卡片
    function renderDifficultyCards() {
      const container = document.getElementById('difficultyCardsContainer');
      container.innerHTML = '';

      DIFFICULTIES.forEach(diff => {
        const card = document.createElement('div');
        card.className = `difficulty-card ${diff.id}`;
        card.onclick = () => selectDifficulty(diff.id);

        let featuresHtml = '';
        diff.features.forEach(feature => {
          featuresHtml += `<li>${feature}</li>`;
        });

        card.innerHTML = `
          <div class="difficulty-icon">${diff.icon}</div>
          <h2 class="difficulty-name">${diff.name}</h2>
          <p class="difficulty-description">${diff.description}</p>
          <div class="difficulty-stats">
            <div class="difficulty-stat">
              <span class="stat-label">Boss HP</span>
              <span class="stat-value">${diff.bossHp}</span>
            </div>
            <div class="difficulty-stat">
              <span class="stat-label">Boss NP</span>
              <span class="stat-value">${diff.bossNp}</span>
            </div>
            <div class="difficulty-stat">
              <span class="stat-label">攻击力</span>
              <span class="stat-value">${diff.bossAttackMin}-${diff.bossAttackMax}</span>
            </div>
          </div>
          <div class="difficulty-features">
            <h3>Boss特性</h3>
            <ul>
              ${featuresHtml}
            </ul>
          </div>
          <button class="select-difficulty-btn">选择${diff.name}</button>
        `;

        container.appendChild(card);
      });
    }

    // 选择职业
    function selectClass(classId) {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      const cls = CLASSES[classId];
      users[currentUser].gameData.selectedClass = classId;
      users[currentUser].gameData.playerHp = cls.hp;
      users[currentUser].gameData.playerNp = cls.np;
      localStorage.setItem('vsFateUsers', JSON.stringify(users));
      
      localStorage.setItem('selectedClass', classId);
      
      // 显示难度选择页面
      showDifficultySelectPage();
    }

    // 选择难度
    function selectDifficulty(difficultyId) {
      const users = JSON.parse(localStorage.getItem('vsFateUsers') || '{}');
      const diff = DIFFICULTIES.find(d => d.id === difficultyId);
      users[currentUser].gameData.selectedDifficulty = difficultyId;
      localStorage.setItem('vsFateUsers', JSON.stringify(users));
      
      localStorage.setItem('selectedDifficulty', difficultyId);
      
      // 跳转到游戏页面
      window.location.href = 'index.html';
    }

    // 开始游戏
    function startGame() {
      if (!currentUser) {
        showLoginModal();
        return;
      }
      showMainMenuPage();
    }

    // 返回主菜单
    function backToMainMenu() {
      document.getElementById('classSelectPage').classList.add('hidden');
      document.getElementById('difficultySelectPage').classList.add('hidden');
      document.getElementById('mainMenuPage').classList.remove('hidden');
    }

    // 从主菜单返回登录
    function backToLoginFromMenu() {
      document.getElementById('mainMenuPage').classList.add('hidden');
      document.getElementById('classSelectPage').classList.add('hidden');
      document.getElementById('difficultySelectPage').classList.add('hidden');
      document.getElementById('loginPage').classList.remove('hidden');
    }

    // 返回职业选择
    function backToClassSelect() {
      document.getElementById('difficultySelectPage').classList.add('hidden');
      document.getElementById('classSelectPage').classList.remove('hidden');
    }

    // 退出游戏
    function exitGame() {
      if (confirm('确定要退出游戏吗？')) {
        localStorage.removeItem('currentUser');
        currentUser = null;
        document.getElementById('tipMessage').textContent = '请先登录账号后再开始游戏';
      }
    }

    // 回车键提交
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleConfirm();
    });

    document.getElementById('username').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
